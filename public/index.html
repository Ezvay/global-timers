<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Timery Metin2</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

.section{
margin:20px auto;
max-width:900px;
}

.container{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.timer{
background:#222;
padding:8px;
border-radius:6px;
}

.timer h3{
margin:3px;
font-size:12px;
}

.time{
font-size:14px;
margin:4px;
}

button{
font-size:10px;
padding:3px 6px;
margin:2px;
border:none;
border-radius:4px;
cursor:pointer;
}

.start{background:#28a745;color:white;}
.stop{background:#dc3545;color:white;}
.reset{background:#ffc107;color:black;}

</style>

</head>

<body>

<h1>Respawn Timery</h1>

<div class="section">

<h2>Kraina Gigantów</h2>

<div class="container" id="giants"></div>

</div>

<div class="section">

<h2>Loch Małp</h2>

<div class="container" id="monkeys"></div>

</div>


<script>

function format(sec){

let h = String(Math.floor(sec/3600)).padStart(2,"0")
let m = String(Math.floor((sec%3600)/60)).padStart(2,"0")
let s = String(sec%60).padStart(2,"0")

return h+":"+m+":"+s

}

function createTimer(name){

let key="timer_"+name

let saved=localStorage.getItem(key)

let time=saved ? parseInt(saved) : 0

let interval=null

let box=document.createElement("div")
box.className="timer"

let title=document.createElement("h3")
title.innerText=name

let display=document.createElement("div")
display.className="time"
display.innerText=format(time)

let start=document.createElement("button")
start.innerText="Start"
start.className="start"

let stop=document.createElement("button")
stop.innerText="Stop"
stop.className="stop"

let reset=document.createElement("button")
reset.innerText="Reset"
reset.className="reset"

start.onclick=function(){

if(interval) return

interval=setInterval(function(){

time++
display.innerText=format(time)

localStorage.setItem(key,time)

},1000)

}

stop.onclick=function(){

clearInterval(interval)
interval=null

}

reset.onclick=function(){

clearInterval(interval)
interval=null
time=0

display.innerText="00:00:00"

localStorage.setItem(key,time)

}

box.appendChild(title)
box.appendChild(display)
box.appendChild(start)
box.appendChild(stop)
box.appendChild(reset)

return box

}

let giants=document.getElementById("giants")
let monkeys=document.getElementById("monkeys")

for(let i=1;i<=8;i++){

giants.appendChild(createTimer("KG_CH"+i))
monkeys.appendChild(createTimer("LM_CH"+i))

}

</script>

</body>
</html>
