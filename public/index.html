<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Timery Metin2</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

.section{
margin:20px auto;
max-width:900px;
}

.container{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.timer{
background:#222;
padding:8px;
border-radius:6px;
}

.timer h3{
margin:3px;
font-size:12px;
}

.time{
font-size:14px;
margin:4px;
}

button{
font-size:10px;
padding:3px 6px;
margin:2px;
border:none;
border-radius:4px;
cursor:pointer;
}

.start{background:#28a745;color:white;}
.stop{background:#dc3545;color:white;}
.reset{background:#ffc107;color:black;}

</style>

</head>

<body>

<h1>Respawn Timery</h1>

<div class="section">

<h2>Kraina Gigantów</h2>

<div class="container" id="giants"></div>

</div>

<div class="section">

<h2>Loch Małp</h2>

<div class="container" id="monkeys"></div>

</div>


<script>

function format(sec){

let h = String(Math.floor(sec/3600)).padStart(2,"0")
let m = String(Math.floor((sec%3600)/60)).padStart(2,"0")
let s = String(sec%60).padStart(2,"0")

return h+":"+m+":"+s

}

function createTimer(name){

let key="timer_"+name

let data=JSON.parse(localStorage.getItem(key) || "{}")

let startTime=data.start || null
let paused=data.paused || 0

let box=document.createElement("div")
box.className="timer"

let title=document.createElement("h3")
title.innerText=name

let display=document.createElement("div")
display.className="time"
display.innerText="00:00:00"

let start=document.createElement("button")
start.innerText="Start"
start.className="start"

let stop=document.createElement("button")
stop.innerText="Stop"
stop.className="stop"

let reset=document.createElement("button")
reset.innerText="Reset"
reset.className="reset"


start.onclick=function(){

if(!startTime){

startTime=Date.now()-paused*1000

localStorage.setItem(key,JSON.stringify({
start:startTime,
paused:0
}))

}

}


stop.onclick=function(){

if(startTime){

paused=Math.floor((Date.now()-startTime)/1000)

startTime=null

localStorage.setItem(key,JSON.stringify({
start:null,
paused:paused
}))

}

}


reset.onclick=function(){

startTime=null
paused=0

display.innerText="00:00:00"

localStorage.removeItem(key)

}


setInterval(function(){

let sec=paused

if(startTime){

sec=Math.floor((Date.now()-startTime)/1000)

}

display.innerText=format(sec)

},500)


box.appendChild(title)
box.appendChild(display)
box.appendChild(start)
box.appendChild(stop)
box.appendChild(reset)

return box

}


let giants=document.getElementById("giants")
let monkeys=document.getElementById("monkeys")

for(let i=1;i<=8;i++){

giants.appendChild(createTimer("KG_CH"+i))
monkeys.appendChild(createTimer("LM_CH"+i))

}

</script>

</body>
</html>
