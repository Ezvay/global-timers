<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Respawn Timery</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.section{
margin:20px auto;
max-width:900px;
}

.container{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.timer{
background:#550000;
padding:8px;
border-radius:6px;
transition:0.3s;
}

.time{
font-size:14px;
margin:4px;
}

button{
font-size:10px;
padding:3px 6px;
margin:2px;
border:none;
border-radius:4px;
cursor:pointer;
}

.start{background:#28a745;color:white;}
.stop{background:#dc3545;color:white;}
.reset{background:#ffc107;color:black;}

.red{background:#550000;}
.yellow{background:#665500;}
.green{background:#004d00;}

#soundToggle{
margin:10px;
padding:6px 12px;
font-size:12px;
}

</style>
</head>

<body>

<h1>Respawn Timery</h1>

<button id="soundToggle">🔊 Dźwięk: ON</button>

<div class="section">
<h2>Kraina Gigantów</h2>
<div class="container" id="giants"></div>
</div>

<div class="section">
<h2>Loch Małp</h2>
<div class="container" id="monkeys"></div>
</div>

<audio id="alertSound">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>


<script>

const socket = io();

let soundEnabled = localStorage.getItem("sound") !== "off";

const soundButton = document.getElementById("soundToggle");
const alertSound = document.getElementById("alertSound");

function updateSoundButton(){
soundButton.innerText = soundEnabled ? "🔊 Dźwięk: ON" : "🔇 Dźwięk: OFF";
}

updateSoundButton();

soundButton.onclick = () => {

soundEnabled = !soundEnabled;

localStorage.setItem("sound", soundEnabled ? "on" : "off");

updateSoundButton();

};


function format(sec){

let h = String(Math.floor(sec/3600)).padStart(2,"0");
let m = String(Math.floor((sec%3600)/60)).padStart(2,"0");
let s = String(sec%60).padStart(2,"0");

return h+":"+m+":"+s;

}

function createTimer(id){

let box=document.createElement("div");
box.className="timer red";

let title=document.createElement("div");
title.innerText=id;

let time=document.createElement("div");
time.className="time";
time.innerText="00:00:00";

let start=document.createElement("button");
start.innerText="Start";
start.className="start";

let stop=document.createElement("button");
stop.innerText="Stop";
stop.className="stop";

let reset=document.createElement("button");
reset.innerText="Reset";
reset.className="reset";

start.onclick=()=>socket.emit("start",id);
stop.onclick=()=>socket.emit("stop",id);
reset.onclick=()=>socket.emit("reset",id);

box.appendChild(title);
box.appendChild(time);
box.appendChild(start);
box.appendChild(stop);
box.appendChild(reset);

return {box,time,id,lastState:null};

}

let giants=document.getElementById("giants");
let monkeys=document.getElementById("monkeys");

let displays={};


// Kraina Gigantów
for(let i=1;i<=8;i++){

let id="KG_CH"+i;

let timer=createTimer(id);

giants.appendChild(timer.box);

displays[id]=timer;

}


// Loch Małp
for(let i=1;i<=8;i++){

let id="LM_CH"+i;

let timer=createTimer(id);

monkeys.appendChild(timer.box);

displays[id]=timer;

}


socket.on("update",(data)=>{

for(let id in data){

if(displays[id]){

let sec=data[id];
let timer=displays[id];
let box=timer.box;

timer.time.innerText=format(sec);

box.classList.remove("red","yellow","green");

let state="red";


// Kraina Gigantów
if(id.startsWith("KG")){

if(sec < 30) state="red";
else if(sec < 45) state="yellow";
else if(sec >= 60) state="green";

}


// Loch Małp
if(id.startsWith("LM")){

if(sec < 3000) state="red";
else if(sec < 3600) state="yellow";
else state="green";

}

box.classList.add(state);


// READY text
if(state==="green"){

timer.time.innerText="READY";

if(timer.lastState!=="green" && soundEnabled){

alertSound.play();

}

}

timer.lastState=state;

}

}

});

</script>

</body>
</html>
