<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Timery Metin2</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.section{
margin:20px auto;
max-width:900px;
}

.container{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

.timer{
background:#222;
padding:8px;
border-radius:6px;
}

.timer h3{
margin:3px;
font-size:12px;
}

.time{
font-size:14px;
margin:4px;
}

button{
font-size:10px;
padding:3px 6px;
margin:2px;
border:none;
border-radius:4px;
cursor:pointer;
}

.start{background:#28a745;color:white;}
.stop{background:#dc3545;color:white;}
.reset{background:#ffc107;color:black;}

</style>

</head>

<body>

<h1>Respawn Timery</h1>

<div class="section">

<h2>Kraina Gigantów</h2>

<div class="container" id="giants"></div>

</div>


<div class="section">

<h2>Loch Małp</h2>

<div class="container" id="monkeys"></div>

</div>



<script>

const socket=io()

function format(sec){

let h=String(Math.floor(sec/3600)).padStart(2,"0")
let m=String(Math.floor((sec%3600)/60)).padStart(2,"0")
let s=String(sec%60).padStart(2,"0")

return h+":"+m+":"+s

}

function createTimer(id){

let box=document.createElement("div")
box.className="timer"

let title=document.createElement("h3")
title.innerText=id

let time=document.createElement("div")
time.className="time"
time.innerText="00:00:00"

let start=document.createElement("button")
start.className="start"
start.innerText="Start"

let stop=document.createElement("button")
stop.className="stop"
stop.innerText="Stop"

let reset=document.createElement("button")
reset.className="reset"
reset.innerText="Reset"

start.onclick=()=>socket.emit("start",id)
stop.onclick=()=>socket.emit("stop",id)
reset.onclick=()=>socket.emit("reset",id)

box.appendChild(title)
box.appendChild(time)
box.appendChild(start)
box.appendChild(stop)
box.appendChild(reset)

return {box,time}

}


let giants=document.getElementById("giants")
let monkeys=document.getElementById("monkeys")

let displays={}

for(let i=1;i<=8;i++){

let id="KG_CH"+i

let t=createTimer("CH"+i)

giants.appendChild(t.box)

displays[id]=t.time

}


for(let i=1;i<=8;i++){

let id="LM_CH"+i

let t=createTimer("CH"+i)

monkeys.appendChild(t.box)

displays[id]=t.time

}



socket.on("update",(data)=>{

for(let id in data){

if(displays[id]){

displays[id].innerText=format(data[id])

}

}

})

</script>

</body>
</html>
