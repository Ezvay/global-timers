<script>

const socket = io()

function format(sec){
const h=String(Math.floor(sec/3600)).padStart(2,"0")
const m=String(Math.floor((sec%3600)/60)).padStart(2,"0")
const s=String(sec%60).padStart(2,"0")
return `${h}:${m}:${s}`
}

function createTimer(name){

const div=document.createElement("div")
div.className="timer"

const title=document.createElement("h2")
title.innerText=name

const display=document.createElement("div")
display.className="time"
display.innerText="00:00:00"

const start=document.createElement("button")
start.innerText="Start"
start.className="start"

const stop=document.createElement("button")
stop.innerText="Stop"
stop.className="stop"

const reset=document.createElement("button")
reset.innerText="Reset"
reset.className="reset"

start.onclick=()=>socket.emit("start",name)
stop.onclick=()=>socket.emit("stop",name)
reset.onclick=()=>socket.emit("reset",name)

div.appendChild(title)
div.appendChild(display)
div.appendChild(start)
div.appendChild(stop)
div.appendChild(reset)

return {div,display}

}

const giants=document.getElementById("giants")
const monkey=document.getElementById("monkey")

let displays={}

for(let i=1;i<=8;i++){

let id="CH"+i

let t1=createTimer(id)
let t2=createTimer(id)

giants.appendChild(t1.div)
monkey.appendChild(t2.div)

displays["giants"+id]=t1.display
displays["monkey"+id]=t2.display

}

socket.on("update",(timers)=>{

for(let id in timers){

let time=format(timers[id].time)

if(displays["giants"+id]) displays["giants"+id].innerText=time
if(displays["monkey"+id]) displays["monkey"+id].innerText=time

}

})

</script>
