<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Postacie</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

.topbar{
display:flex;
justify-content:center;
gap:20px;
margin:20px;
}

.container{
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:20px;
}

.character{
background:linear-gradient(#1a1a1a,#0c0c0c);
border:2px solid #6a5125;
border-radius:10px;
padding:12px;
}

.header{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}

.header img{
width:34px;
}

.task{
display:flex;
justify-content:space-between;
background:#1f1f1f;
padding:6px;
margin:4px 0;
border-radius:6px;
}

.taskLeft{
display:flex;
align-items:center;
gap:8px;
}

.taskLeft img{
width:20px;
}

.timer{
font-size:12px;
color:#aaa;
}

button{
background:#3b2a0f;
border:1px solid #caa64a;
color:#ffd36a;
padding:4px 8px;
cursor:pointer;
border-radius:6px;
}

</style>
</head>

<body>

<div class="topbar">

Reset:
<input id="resetHour" type="number" min="0" max="23" value="0">
:
<input id="resetMinute" type="number" min="0" max="59" value="0">

<button onclick="setReset()">Ustaw reset</button>

<button onclick="manualReset()">Manual reset</button>

</div>

<h1>Postacie</h1>

<div class="container" id="characters"></div>

<script>

const socket = io()

const characters = {

Medal:"/icons/warrior.png",
Bieluszek:"/icons/ninja.png",
Pojara:"/icons/shaman.png",
Suczka:"/icons/shaman.png",
Czantorianka:"/icons/shaman.png",
EwaZajączkowska:"/icons/warrior.png",
Yodasz:"/icons/sura.png"

}

const icons = {

KU:"/icons/skillbook.png",
Poly:"/icons/polymorph.png",
Bio:"/icons/orctooth.png",
Medal:"/icons/horsemedal.png",
Dow:"/icons/skillbook.png"

}

const container=document.getElementById("characters")

const checkboxes={}
const medalTimers={}

function startTimer(el,end){

function update(){

let diff=end-Date.now()

if(diff<=0){
el.innerText="GOTOWE"
return
}

let h=Math.floor(diff/3600000)
let m=Math.floor((diff%3600000)/60000)
let s=Math.floor((diff%60000)/1000)

el.innerText=
h.toString().padStart(2,"0")+":"+
m.toString().padStart(2,"0")+":"+
s.toString().padStart(2,"0")

}

update()
setInterval(update,1000)

}

for(let char in characters){

let box=document.createElement("div")
box.className="character"

let header=document.createElement("div")
header.className="header"

header.innerHTML=`
<img src="${characters[char]}">
<b>${char}</b>
`

box.appendChild(header)

for(let i=1;i<=5;i++){
createTask(box,char,"KU"+i,icons.KU)
}

createTask(box,char,"Polymorph",icons.Poly)
createTask(box,char,"Biolog",icons.Bio)

if(char==="Suczka" || char==="Czantorianka"){
createTask(box,char,"Dowodzenie",icons.Dow)
}

let row=document.createElement("div")
row.className="task"

row.innerHTML=`
<div class="taskLeft">
<img src="${icons.Medal}">
Medal konny
</div>
<button onclick="giveMedal('${char}')">Oddaj</button>
`

box.appendChild(row)

let timer=document.createElement("div")
timer.className="timer"

box.appendChild(timer)

medalTimers[char]=timer

container.appendChild(box)

}

function createTask(box,char,name,icon){

let row=document.createElement("div")
row.className="task"

let left=document.createElement("div")
left.className="taskLeft"

left.innerHTML=`<img src="${icon}">${name}`

let cb=document.createElement("input")
cb.type="checkbox"

cb.onchange=()=>{

socket.emit("toggleTask",{
char:char,
task:name,
value:cb.checked
})

}

checkboxes[char+"_"+name]=cb

row.appendChild(left)
row.appendChild(cb)

box.appendChild(row)

}

function giveMedal(char){

socket.emit("horseMedal",char)

}

function setReset(){

socket.emit("setResetTime",{
hour:parseInt(resetHour.value),
minute:parseInt(resetMinute.value)
})

}

function manualReset(){

socket.emit("manualReset")

}

socket.on("charactersUpdate",(data)=>{

for(let char in data){

let tasks=data[char]

for(let task in tasks){

if(task==="horseTimer") continue

let cb=checkboxes[char+"_"+task]

if(cb) cb.checked=tasks[task]

}

if(tasks.horseTimer){

startTimer(medalTimers[char],tasks.horseTimer)

}

}

})

</script>

</body>
</html>
