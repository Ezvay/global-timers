<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Postacie</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

h1{
margin-top:20px;
}

.backButton{
margin:20px;
padding:8px 20px;
border-radius:8px;
border:2px solid #caa64a;
background:#3b2a0f;
color:#ffd36a;
cursor:pointer;
}

.container{
max-width:1000px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.character{
background:#1b1b1b;
border:2px solid #444;
border-radius:10px;
padding:15px;
}

.task{
display:flex;
align-items:center;
justify-content:space-between;
background:#222;
padding:6px 10px;
margin:6px 0;
border-radius:6px;
}

.taskLeft{
display:flex;
align-items:center;
gap:8px;
}

.task img{
width:22px;
}

.timer{
font-size:12px;
color:#aaa;
}

</style>
</head>

<body>

<button class="backButton" onclick="window.location.href='/'">
⬅ Powrót
</button>

<h1>Postacie</h1>

<div class="container" id="characters"></div>

<script>

const socket = io()

const characters = [
"Medal",
"Bieluszek",
"Pojara",
"Suczka",
"Czantorianka",
"EwaZajączkowska",
"Yodasz"
]

const tasks = [
{name:"KU1",icon:"https://en-wiki.metin2.gameforge.com/images/2/2e/Skill_Book.png"},
{name:"KU2",icon:"https://en-wiki.metin2.gameforge.com/images/2/2e/Skill_Book.png"},
{name:"KU3",icon:"https://en-wiki.metin2.gameforge.com/images/2/2e/Skill_Book.png"},
{name:"KU4",icon:"https://en-wiki.metin2.gameforge.com/images/2/2e/Skill_Book.png"},
{name:"KU5",icon:"https://en-wiki.metin2.gameforge.com/images/2/2e/Skill_Book.png"},
{name:"Polymorph",icon:"https://en-wiki.metin2.gameforge.com/images/7/70/Polymorph_Marble.png"},
{name:"Biolog",icon:"https://en-wiki.metin2.gameforge.com/images/f/f4/Orc_Tooth.png"},
{name:"Medal",icon:"https://en-wiki.metin2.gameforge.com/images/9/95/Horse_Medal.png"}
]

const container=document.getElementById("characters")
const displays={}

/* tworzenie postaci */

characters.forEach(char=>{

let box=document.createElement("div")
box.className="character"

let title=document.createElement("h2")
title.innerText=char

box.appendChild(title)

tasks.forEach(task=>{

let row=document.createElement("div")
row.className="task"

let left=document.createElement("div")
left.className="taskLeft"

let icon=document.createElement("img")
icon.src=task.icon

let label=document.createElement("span")
label.innerText=task.name

left.appendChild(icon)
left.appendChild(label)

let checkbox=document.createElement("input")
checkbox.type="checkbox"

checkbox.onchange=()=>{

if(task.name==="Medal" && checkbox.checked){

socket.emit("horseMedal",char)

}else{

socket.emit("toggleTask",{
char:char,
task:task.name,
value:checkbox.checked
})

}

}

row.appendChild(left)
row.appendChild(checkbox)

box.appendChild(row)

})

/* dowodzenie */

if(char==="Suczka" || char==="Czantorianka"){

let row=document.createElement("div")
row.className="task"

row.innerHTML=`
<div class="taskLeft">
<img src="https://en-wiki.metin2.gameforge.com/images/2/2e/Skill_Book.png">
<span>Dowodzenie</span>
</div>
<input type="checkbox" onchange="toggleDowodzenie('${char}',this)">
`

box.appendChild(row)

}

container.appendChild(box)

displays[char]=box

})

function toggleDowodzenie(char,el){

socket.emit("toggleTask",{
char:char,
task:"Dowodzenie",
value:el.checked
})

}

/* update z serwera */

socket.on("charactersUpdate",(data)=>{

for(let char in data){

let tasks=data[char]

for(let task in tasks){

let checkbox=document.querySelector(
`input[data-char="${char}"][data-task="${task}"]`
)

if(checkbox) checkbox.checked=tasks[task]

}

}

})

</script>

</body>
</html>
