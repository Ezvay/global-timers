<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Postacie</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

h1{
margin-top:20px;
}

.backButton{
margin:20px;
padding:8px 20px;
border-radius:8px;
border:2px solid #caa64a;
background:#3b2a0f;
color:#ffd36a;
cursor:pointer;
}

/* GRID */

.container{
max-width:1000px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

/* CHARACTER CARD */

.character{

background:#1b1b1b;
border:2px solid #444;
border-radius:10px;
padding:15px;

}

.character h2{
margin-top:0;
}

/* TASK */

.task{
display:flex;
align-items:center;
justify-content:space-between;
margin:6px 0;
background:#222;
padding:6px 10px;
border-radius:6px;
}

.taskLeft{
display:flex;
align-items:center;
gap:8px;
}

.task img{
width:22px;
height:22px;
}

.task input{
transform:scale(1.3);
cursor:pointer;
}

</style>
</head>

<body>

<button class="backButton" onclick="window.location.href='/'">
⬅ Powrót
</button>

<h1>Postacie</h1>

<div class="container" id="characters"></div>

<script>

/* POSTACIE */

const characters = [
"Medal",
"Bieluszek",
"Pojara",
"Suczka",
"Czantorianka",
"EwaZajączkowska",
"Yodasz"
]

/* ZADANIA */

const tasks = [

{name:"KU 1",icon:"https://en-wiki.metin2.gameforge.com/images/2/2e/Skill_Book.png"},
{name:"KU 2",icon:"https://en-wiki.metin2.gameforge.com/images/2/2e/Skill_Book.png"},
{name:"KU 3",icon:"https://en-wiki.metin2.gameforge.com/images/2/2e/Skill_Book.png"},
{name:"Medal Konny",icon:"https://en-wiki.metin2.gameforge.com/images/9/95/Horse_Medal.png"},
{name:"Biolog - Ząb Orka",icon:"https://en-wiki.metin2.gameforge.com/images/f/f4/Orc_Tooth.png"},
{name:"Księga Polimorfii",icon:"https://en-wiki.metin2.gameforge.com/images/7/70/Polymorph_Marble.png"}

]

const container=document.getElementById("characters")

/* RESET O PÓŁNOCY */

function checkReset(){

const today=new Date().toDateString()

const last=localStorage.getItem("dailyReset")

if(last!==today){

localStorage.clear()
localStorage.setItem("dailyReset",today)

}

}

checkReset()

/* GENEROWANIE POSTACI */

characters.forEach(char=>{

let box=document.createElement("div")
box.className="character"

let title=document.createElement("h2")
title.innerText=char

box.appendChild(title)

/* TASKS */

tasks.forEach(task=>{

let row=document.createElement("div")
row.className="task"

let left=document.createElement("div")
left.className="taskLeft"

let icon=document.createElement("img")
icon.src=task.icon

let label=document.createElement("span")
label.innerText=task.name

left.appendChild(icon)
left.appendChild(label)

let checkbox=document.createElement("input")
checkbox.type="checkbox"

let key=char+"_"+task.name

checkbox.checked=localStorage.getItem(key)==="true"

checkbox.onchange=()=>{

localStorage.setItem(key,checkbox.checked)

}

row.appendChild(left)
row.appendChild(checkbox)

box.appendChild(row)

})

container.appendChild(box)

})

</script>

</body>
</html>
