<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Postacie</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

/* TOP BAR */

.topbar{
display:flex;
justify-content:space-between;
max-width:1100px;
margin:20px auto;
}

.backButton{
background:linear-gradient(#6b4d1f,#3b2a0f);
border:2px solid #caa64a;
color:#ffd36a;
padding:8px 20px;
border-radius:8px;
cursor:pointer;
}

/* GRID */

.container{
max-width:1100px;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:20px;
}

/* POSTAĆ */

.character{

background:linear-gradient(#1a1a1a,#0c0c0c);
border:2px solid #6a5125;
border-radius:10px;
padding:12px;

}

.characterHeader{
display:flex;
align-items:center;
gap:10px;
margin-bottom:10px;
}

.characterHeader img{
width:34px;
}

/* TASK */

.task{
display:flex;
align-items:center;
justify-content:space-between;
background:#1f1f1f;
padding:6px 10px;
margin:5px 0;
border-radius:6px;
border:1px solid #333;
}

.taskLeft{
display:flex;
align-items:center;
gap:8px;
}

.taskLeft img{
width:20px;
}

.timer{
font-size:12px;
color:#aaa;
margin-top:4px;
}

button{
background:linear-gradient(#6b4d1f,#3b2a0f);
border:1px solid #caa64a;
color:#ffd36a;
padding:3px 8px;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="topbar">

<button class="backButton" onclick="window.location.href='/'">
⬅ Powrót
</button>

</div>

<h1>Postacie</h1>

<div class="container" id="characters"></div>

<script>

const socket = io()

const characters = {

Medal:"https://en-wiki.metin2.gameforge.com/images/4/4e/Warrior.png",
Bieluszek:"https://en-wiki.metin2.gameforge.com/images/3/3e/Ninja.png",
Pojara:"https://en-wiki.metin2.gameforge.com/images/6/6c/Shaman.png",
Suczka:"https://en-wiki.metin2.gameforge.com/images/6/6c/Shaman.png",
Czantorianka:"https://en-wiki.metin2.gameforge.com/images/6/6c/Shaman.png",
EwaZajączkowska:"https://en-wiki.metin2.gameforge.com/images/4/4e/Warrior.png",
Yodasz:"https://en-wiki.metin2.gameforge.com/images/7/7a/Sura.png"

}

const icons = {

KU:"https://en-wiki.metin2.gameforge.com/images/2/2e/Skill_Book.png",
Poly:"https://en-wiki.metin2.gameforge.com/images/7/70/Polymorph_Marble.png",
Biolog:"https://en-wiki.metin2.gameforge.com/images/f/f4/Orc_Tooth.png",
Medal:"https://en-wiki.metin2.gameforge.com/images/9/95/Horse_Medal.png",
Dowodzenie:"https://en-wiki.metin2.gameforge.com/images/2/2e/Skill_Book.png"

}

const container=document.getElementById("characters")

const checkboxes={}
const medalTimers={}

/* TIMER MEDALU */

function startHorseTimer(el,end){

function update(){

let diff=end-Date.now()

if(diff<=0){

el.innerText="GOTOWE"
return

}

let h=Math.floor(diff/3600000)
let m=Math.floor((diff%3600000)/60000)
let s=Math.floor((diff%60000)/1000)

el.innerText=
h.toString().padStart(2,"0")+":"+
m.toString().padStart(2,"0")+":"+
s.toString().padStart(2,"0")

}

update()
setInterval(update,1000)

}

/* GENEROWANIE POSTACI */

for(let char in characters){

let box=document.createElement("div")
box.className="character"

let header=document.createElement("div")
header.className="characterHeader"

header.innerHTML=`
<img src="${characters[char]}">
<b>${char}</b>
`

box.appendChild(header)

/* KU */

for(let i=1;i<=5;i++){

createTask(box,char,"KU"+i,icons.KU)

}

/* inne */

createTask(box,char,"Polymorph",icons.Poly)
createTask(box,char,"Biolog",icons.Biolog)

/* dowodzenie */

if(char==="Suczka" || char==="Czantorianka"){

createTask(box,char,"Dowodzenie",icons.Dowodzenie)

}

/* medal */

let medalRow=document.createElement("div")
medalRow.className="task"

medalRow.innerHTML=`
<div class="taskLeft">
<img src="${icons.Medal}">
Medal konny
</div>
<button onclick="giveMedal('${char}')">Oddaj</button>
`

box.appendChild(medalRow)

let timer=document.createElement("div")
timer.className="timer"

box.appendChild(timer)

medalTimers[char]=timer

container.appendChild(box)

}

/* funkcje */

function createTask(box,char,name,icon){

let row=document.createElement("div")
row.className="task"

let left=document.createElement("div")
left.className="taskLeft"

left.innerHTML=`<img src="${icon}">${name}`

let cb=document.createElement("input")
cb.type="checkbox"

cb.onchange=()=>{

socket.emit("toggleTask",{
char:char,
task:name,
value:cb.checked
})

}

checkboxes[char+"_"+name]=cb

row.appendChild(left)
row.appendChild(cb)

box.appendChild(row)

}

function giveMedal(char){

socket.emit("horseMedal",char)

}

/* update */

socket.on("charactersUpdate",(data)=>{

for(let char in data){

let tasks=data[char]

for(let task in tasks){

if(task==="horseTimer") continue

let cb=checkboxes[char+"_"+task]

if(cb) cb.checked=tasks[task]

}

if(tasks.horseTimer){

startHorseTimer(medalTimers[char],tasks.horseTimer)

}

}

})

</script>

</body>
</html>
