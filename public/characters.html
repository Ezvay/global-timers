<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Postacie</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.character{
background:#1b1b1b;
border:2px solid #444;
border-radius:10px;
padding:15px;
}

.task{
display:flex;
align-items:center;
justify-content:space-between;
background:#222;
padding:6px 10px;
margin:6px 0;
border-radius:6px;
}

.timer{
font-size:12px;
color:#aaa;
}

</style>
</head>

<body>

<h1>Postacie</h1>

<div class="container" id="characters"></div>

<script>

const socket = io()

const characters = [
"Medal",
"Bieluszek",
"Pojara",
"Suczka",
"Czantorianka",
"EwaZajączkowska",
"Yodasz"
]

const container=document.getElementById("characters")

const tasks=[
"KU1","KU2","KU3","KU4","KU5",
"Polymorph",
"Biolog"
]

let checkboxes={}
let medalTimers={}

/* TIMER MEDALU */

function startHorseTimer(el,end){

function update(){

let diff=end-Date.now()

if(diff<=0){

el.innerText="GOTOWE"
return

}

let h=Math.floor(diff/3600000)
let m=Math.floor((diff%3600000)/60000)
let s=Math.floor((diff%60000)/1000)

el.innerText=
h.toString().padStart(2,"0")+":"+
m.toString().padStart(2,"0")+":"+
s.toString().padStart(2,"0")

}

update()
setInterval(update,1000)

}

/* GENEROWANIE POSTACI */

characters.forEach(char=>{

let box=document.createElement("div")
box.className="character"

let title=document.createElement("h2")
title.innerText=char

box.appendChild(title)

/* KU i inne */

tasks.forEach(task=>{

let row=document.createElement("div")
row.className="task"

let label=document.createElement("span")
label.innerText=task

let cb=document.createElement("input")
cb.type="checkbox"

cb.onchange=()=>{

socket.emit("toggleTask",{
char:char,
task:task,
value:cb.checked
})

}

checkboxes[char+"_"+task]=cb

row.appendChild(label)
row.appendChild(cb)

box.appendChild(row)

})

/* Dowodzenie */

if(char==="Suczka" || char==="Czantorianka"){

let row=document.createElement("div")
row.className="task"

let label=document.createElement("span")
label.innerText="Dowodzenie"

let cb=document.createElement("input")
cb.type="checkbox"

cb.onchange=()=>{

socket.emit("toggleTask",{
char:char,
task:"Dowodzenie",
value:cb.checked
})

}

checkboxes[char+"_Dowodzenie"]=cb

row.appendChild(label)
row.appendChild(cb)

box.appendChild(row)

}

/* Medal konny */

let row=document.createElement("div")
row.className="task"

let label=document.createElement("span")
label.innerText="Medal konny"

let btn=document.createElement("button")
btn.innerText="Oddaj"

let timer=document.createElement("div")
timer.className="timer"

btn.onclick=()=>{

socket.emit("horseMedal",char)

}

row.appendChild(label)
row.appendChild(btn)

box.appendChild(row)
box.appendChild(timer)

medalTimers[char]=timer

container.appendChild(box)

})

/* UPDATE Z SERWERA */

socket.on("charactersUpdate",(data)=>{

for(let char in data){

let tasks=data[char]

for(let task in tasks){

if(task==="horseTimer") continue

let cb=checkboxes[char+"_"+task]

if(cb) cb.checked=tasks[task]

}

if(tasks.horseTimer){

startHorseTimer(medalTimers[char],tasks.horseTimer)

}

}

})

</script>

</body>
</html>
