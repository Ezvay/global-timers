<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Własne Timery</title>
<script src="/socket.io/socket.io.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c; --gold-light: #f0d080; --gold-dark: #7a5f1e;
    --bg: #090806; --border: #3a2e1a; --text: #d4c4a0; --text-dim: #7a6a50;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Crimson Text',serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .bg-layer { position:fixed; inset:0; z-index:0; background:radial-gradient(ellipse 80% 40% at 50% 0%, rgba(139,26,26,0.1) 0%, transparent 60%), #090806; }

  /* TOP BAR */
  .topbar {
    position:relative; z-index:10;
    display:flex; align-items:center; justify-content:space-between;
    max-width:1300px; margin:0 auto; padding:14px 20px;
    border-bottom:1px solid var(--border);
    background:linear-gradient(to bottom,rgba(17,14,9,0.96),rgba(9,8,6,0.8));
  }
  .topbar-left { display:flex; align-items:center; gap:12px; }
  .page-title { font-family:'Cinzel',serif; font-size:18px; font-weight:600; color:var(--gold-light); letter-spacing:2px; text-shadow:0 0 20px rgba(201,168,76,0.4); }
  .nav-btn {
    font-family:'Cinzel',serif; font-size:10px; letter-spacing:2px; text-transform:uppercase;
    color:var(--gold-dark); background:rgba(201,168,76,0.06);
    border:1px solid rgba(201,168,76,0.25); border-radius:2px;
    padding:7px 14px; cursor:pointer; text-decoration:none; display:inline-block; transition:all 0.2s;
  }
  .nav-btn:hover { color:var(--gold); border-color:rgba(201,168,76,0.6); background:rgba(201,168,76,0.12); }

  /* VOLUME */
  .vol-wrap { display:flex; align-items:center; gap:8px; font-family:'Cinzel',serif; font-size:9px; letter-spacing:1px; color:var(--text-dim); }
  input[type=range] { -webkit-appearance:none; width:90px; height:3px; background:linear-gradient(to right,var(--gold),var(--gold-dark)); border-radius:2px; outline:none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:13px; height:13px; border-radius:50%; background:var(--gold); cursor:pointer; box-shadow:0 0 6px rgba(201,168,76,0.5); }

  /* ADD PANEL */
  .add-panel { position:relative; z-index:1; max-width:1300px; margin:18px auto 0; padding:0 20px; }
  .add-panel-inner {
    background:rgba(17,14,9,0.7); border:1px solid var(--border); border-radius:3px;
    padding:14px 18px; display:flex; align-items:flex-end; gap:12px; flex-wrap:wrap;
  }
  .field { display:flex; flex-direction:column; gap:5px; }
  .field label { font-family:'Cinzel',serif; font-size:9px; letter-spacing:2px; color:var(--text-dim); text-transform:uppercase; }
  .field input {
    background:rgba(0,0,0,0.5); border:1px solid rgba(201,168,76,0.2);
    color:var(--text); font-family:'Crimson Text',serif; font-size:15px;
    padding:6px 10px; border-radius:2px; outline:none; transition:border-color 0.2s;
  }
  .field input:focus { border-color:rgba(201,168,76,0.55); }
  .field input[type=number] { width:90px; }
  .field input[type=text]   { width:190px; }
  .field .hint { font-size:11px; color:var(--text-dim); font-style:italic; margin-top:2px; }
  .action-btn {
    font-family:'Cinzel',serif; font-size:10px; letter-spacing:2px; text-transform:uppercase;
    color:var(--gold-dark); background:rgba(201,168,76,0.08);
    border:1px solid rgba(201,168,76,0.3); border-radius:2px;
    padding:8px 18px; cursor:pointer; transition:all 0.2s; white-space:nowrap;
  }
  .action-btn:hover { color:var(--gold); border-color:rgba(201,168,76,0.6); background:rgba(201,168,76,0.16); }
  .action-btn:disabled { opacity:0.35; cursor:default; }
  .place-count { font-family:'Cinzel',serif; font-size:10px; color:var(--text-dim); letter-spacing:1px; align-self:center; }

  /* MAIN */
  .main { position:relative; z-index:1; max-width:1300px; margin:18px auto 40px; padding:0 20px; }

  /* PLACE CARD */
  .place-card {
    background:linear-gradient(160deg,#1c1510,#0e0b07);
    border:1px solid var(--border); border-radius:3px; margin-bottom:16px; overflow:hidden;
    transition:border-color 0.3s;
  }
  .place-card:hover { border-color:rgba(201,168,76,0.3); }
  .place-card::before { content:''; display:block; height:1px; background:linear-gradient(to right,transparent,rgba(201,168,76,0.2),transparent); }

  /* PLACE HEADER */
  .place-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 16px; border-bottom:1px solid var(--border); background:rgba(0,0,0,0.3);
  }
  .place-header-left { display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .place-name { font-family:'Cinzel',serif; font-size:15px; font-weight:600; color:var(--gold-light); letter-spacing:1px; }
  .place-meta { font-size:13px; color:var(--text-dim); font-style:italic; }
  .place-actions { display:flex; gap:8px; flex-shrink:0; }

  .icon-btn {
    font-family:'Cinzel',serif; font-size:9px; letter-spacing:1px; text-transform:uppercase;
    padding:5px 10px; border-radius:2px; cursor:pointer; transition:all 0.2s;
    border:1px solid rgba(201,168,76,0.2); color:var(--text-dim); background:rgba(255,255,255,0.03);
  }
  .icon-btn:hover { color:var(--gold); border-color:rgba(201,168,76,0.5); background:rgba(201,168,76,0.1); }
  .icon-btn.del { border-color:rgba(180,50,50,0.25); color:#804040; }
  .icon-btn.del:hover { color:#ff6060; border-color:rgba(200,60,60,0.6); background:rgba(140,30,30,0.15); }
  .icon-btn.save { color:#60a060; border-color:rgba(80,160,80,0.3); }
  .icon-btn.save:hover { color:#80ff80; border-color:rgba(80,200,80,0.6); background:rgba(40,120,40,0.15); }

  /* EDIT FORM */
  .edit-form {
    display:none; align-items:flex-end; gap:10px; flex-wrap:wrap;
    padding:10px 16px; border-bottom:1px solid var(--border); background:rgba(0,0,0,0.2);
  }
  .edit-form.open { display:flex; }
  .edit-form .field label { font-size:9px; }
  .edit-form input {
    background:rgba(0,0,0,0.5); border:1px solid rgba(201,168,76,0.2);
    color:var(--text); font-family:'Crimson Text',serif; font-size:14px;
    padding:5px 8px; border-radius:2px; outline:none; transition:border-color 0.2s;
  }
  .edit-form input:focus { border-color:rgba(201,168,76,0.55); }
  .edit-form input[type=number] { width:85px; }
  .edit-form input[type=text]   { width:160px; }

  /* TIMER GRID */
  .ch-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(170px,1fr)); gap:10px; padding:14px; }

  /* TIMER CARD — same style as giants */
  .timer-card {
    background:linear-gradient(160deg,#1a1510,#0e0b07);
    border:1px solid #3a2e18; border-radius:3px;
    padding:10px 8px; position:relative; overflow:hidden;
    transition:border-color 0.4s, background 0.4s, box-shadow 0.4s;
  }
  .timer-card::before { content:''; position:absolute; top:0;left:0;right:0;height:1px; background:linear-gradient(to right,transparent,rgba(201,168,76,0.18),transparent); }
  .timer-card.st-grey   { border-color:#3a3530; background:linear-gradient(160deg,#1e1c18,#0f0e0b); }
  .timer-card.st-red    { border-color:#6a2020; background:linear-gradient(160deg,#200a0a,#130505); box-shadow:0 0 15px rgba(139,26,26,0.2); }
  .timer-card.st-yellow { border-color:#7a6020; background:linear-gradient(160deg,#1e1a08,#0f0d04); box-shadow:0 0 15px rgba(180,140,30,0.15); }
  .timer-card.st-green  { border-color:#2a6a35; background:linear-gradient(160deg,#081a0c,#040f06); box-shadow:0 0 20px rgba(42,160,70,0.25); animation:pulse-green 2s ease-in-out infinite; }
  @keyframes pulse-green { 0%,100%{box-shadow:0 0 20px rgba(42,160,70,0.25);}50%{box-shadow:0 0 40px rgba(42,160,70,0.5);} }

  .timer-name { font-family:'Cinzel',serif; font-size:10px; letter-spacing:1px; color:var(--text-dim); text-align:center; margin-bottom:5px; text-transform:uppercase; }
  .timer-display {
    font-family:'Cinzel',serif; font-size:19px; font-weight:600;
    text-align:center; letter-spacing:2px; margin:5px 0;
    color:var(--text); transition:color 0.4s, text-shadow 0.4s;
  }
  .st-red    .timer-display { color:#ff6060; text-shadow:0 0 12px rgba(255,80,80,0.45); }
  .st-yellow .timer-display { color:#f0c060; text-shadow:0 0 12px rgba(240,180,60,0.45); }
  .st-green  .timer-display { color:#60e080; text-shadow:0 0 14px rgba(80,220,100,0.55); }

  .timer-btns { display:flex; gap:4px; justify-content:center; margin-top:6px; flex-wrap:wrap; }
  .btn {
    font-family:'Cinzel',serif; font-size:9px; letter-spacing:1px; text-transform:uppercase;
    padding:5px 10px; border-radius:2px; cursor:pointer; transition:all 0.2s;
    border:1px solid rgba(201,168,76,0.3); color:var(--gold-dark); background:rgba(201,168,76,0.06);
  }
  .btn:hover             { color:var(--gold); border-color:var(--gold); background:rgba(201,168,76,0.14); }
  .btn.start:hover { color:#80ff80; border-color:#40a050; background:rgba(60,140,70,0.15); }
  .btn.stop:hover  { color:#ff8080; border-color:#a04040; background:rgba(140,40,40,0.15); }

  /* EMPTY STATE */
  .empty-state { text-align:center; padding:60px 20px; font-family:'Cinzel',serif; font-size:12px; letter-spacing:3px; color:var(--text-dim); text-transform:uppercase; }
</style>
</head>
<body>
<div class="bg-layer"></div>

<div class="topbar">
  <div class="topbar-left">
    <a class="nav-btn" href="/">⬅ Powrót</a>
    <div class="page-title">Własne Timery</div>
  </div>
  <div class="vol-wrap">
    <span style="font-size:13px">🔊</span>
    <input type="range" id="volSlider" min="0" max="1" step="0.05">
    <span>Głośność</span>
  </div>
</div>

<!-- PANEL DODAWANIA -->
<div class="add-panel">
  <div class="add-panel-inner">
    <div class="field">
      <label>Nazwa miejsca</label>
      <input type="text" id="inpName" placeholder="np. Loch Mantikory" maxlength="40">
    </div>
    <div class="field">
      <label>Żółty po (min)</label>
      <input type="number" id="inpYellow" placeholder="25" min="0" max="9999">
      <span class="hint">0 = brak</span>
    </div>
    <div class="field">
      <label>Zielony po (min)</label>
      <input type="number" id="inpGreen" placeholder="30" min="1" max="9999">
    </div>
    <div class="field">
      <label>Kanałów</label>
      <input type="number" id="inpChannels" placeholder="4" min="1" max="20">
    </div>
    <button class="action-btn" id="addPlaceBtn" onclick="addPlace()">+ Dodaj miejsce</button>
    <div class="place-count" id="placeCount">0 / 10</div>
  </div>
</div>

<div class="main" id="main">
  <div class="empty-state" id="emptyState">Brak miejsc — dodaj pierwsze powyżej</div>
</div>

<script>
const socket = io();

/* AUDIO */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let volume = parseFloat(localStorage.getItem('vol_custom')) || 0.25;
const volSlider = document.getElementById('volSlider');
volSlider.value = volume;
volSlider.oninput = () => { volume = parseFloat(volSlider.value); localStorage.setItem('vol_custom', volume); };

function beep(freq=800, dur=0.15) {
  const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.frequency.value = freq; osc.start();
  gain.gain.setValueAtTime(volume, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  osc.stop(audioCtx.currentTime + dur);
}
function tripleBeep() { beep(); setTimeout(()=>beep(),250); setTimeout(()=>beep(),500); }
function singleBeep()  { beep(600, 0.7); }

/* STATE */
let places = [];
let customTimers = {};

/* FORMAT */
function fmt(sec) {
  const h = String(Math.floor(sec/3600)).padStart(2,'0');
  const m = String(Math.floor((sec%3600)/60)).padStart(2,'0');
  const s = String(sec%60).padStart(2,'0');
  return h+':'+m+':'+s;
}

/* BEEP TRACKING — per key */
const beeped = {};

/* UPDATE ONE TIMER CARD */
function updateCard(key, sec, place) {
  const card = document.getElementById('tc_'+key);
  const disp = document.getElementById('td_'+key);
  if (!card || !disp) return;

  disp.innerText = fmt(sec);

  const yellow = place.yellowSec;
  const green  = place.greenSec;

  let state = 'st-grey';
  if (sec > 0) {
    if (green && sec >= green)          state = 'st-green';
    else if (yellow && sec >= yellow)   state = 'st-yellow';
    else                                state = 'st-red';
  }
  card.className = 'timer-card ' + state;

  // beeps
  if (!beeped[key]) beeped[key] = {};
  if (yellow && sec >= yellow && sec < yellow+2 && !beeped[key].yellow) {
    tripleBeep(); beeped[key].yellow = true;
  }
  if (green && sec >= green && sec < green+2 && !beeped[key].green) {
    singleBeep(); beeped[key].green = true;
  }
  if (sec === 0) { beeped[key] = {}; }
}

/* ADD PLACE */
function addPlace() {
  const name     = document.getElementById('inpName').value.trim();
  const yellow   = parseInt(document.getElementById('inpYellow').value)   || 0;
  const green    = parseInt(document.getElementById('inpGreen').value);
  const channels = parseInt(document.getElementById('inpChannels').value);

  if (!name)                   return flash('inpName',     'Podaj nazwę!');
  if (!green || green < 1)     return flash('inpGreen',    'Podaj próg zielony!');
  if (!channels || channels<1) return flash('inpChannels', 'Podaj liczbę kanałów!');
  if (places.length >= 10)     return;

  socket.emit('addPlace', { name, yellowSec: yellow*60, greenSec: green*60, channels });
  document.getElementById('inpName').value = '';
  document.getElementById('inpYellow').value = '';
  document.getElementById('inpGreen').value = '';
  document.getElementById('inpChannels').value = '';
}

function flash(id, msg) {
  const el = document.getElementById(id);
  const prev = el.placeholder;
  el.style.borderColor = 'rgba(200,60,60,0.8)';
  el.placeholder = msg;
  setTimeout(() => { el.style.borderColor = ''; el.placeholder = prev; }, 1800);
}

/* REMOVE / EDIT */
function removePlace(placeId) {
  if (!confirm('Usunąć to miejsce wraz ze wszystkimi timerami?')) return;
  socket.emit('removePlace', placeId);
}
function toggleEdit(placeId) {
  document.getElementById('editform_'+placeId).classList.toggle('open');
}
function saveEdit(placeId) {
  const name     = document.getElementById('ename_'+placeId).value.trim();
  const yellow   = parseInt(document.getElementById('eyellow_'+placeId).value)   || 0;
  const green    = parseInt(document.getElementById('egreen_'+placeId).value);
  const channels = parseInt(document.getElementById('echannels_'+placeId).value);
  if (!name || !green || !channels) return;
  socket.emit('editPlace', { id:placeId, name, yellowSec:yellow*60, greenSec:green*60, channels });
  document.getElementById('editform_'+placeId).classList.remove('open');
}

/* CHANNEL ACTIONS */
function startCh(placeId, ch) { socket.emit('startCustom', placeId+'_ch'+ch); }
function stopCh(placeId, ch)  { socket.emit('stopCustom',  placeId+'_ch'+ch); }
function resetCh(placeId, ch) { socket.emit('resetCustom', placeId+'_ch'+ch); }

/* BUILD PLACE CARD */
function buildPlaceCard(place) {
  const old = document.getElementById('place_'+place.id);
  if (old) old.remove();

  const yMin = place.yellowSec ? (place.yellowSec/60) : null;
  const gMin = place.greenSec/60;
  const metaParts = [];
  if (yMin) metaParts.push('Żółty: '+yMin+' min');
  metaParts.push('Zielony: '+gMin+' min');
  metaParts.push(place.channels+' kanałów');

  const card = document.createElement('div');
  card.className = 'place-card'; card.id = 'place_'+place.id;
  card.innerHTML = `
    <div class="place-header">
      <div class="place-header-left">
        <span class="place-name">${place.name}</span>
        <span class="place-meta">${metaParts.join(' &nbsp;•&nbsp; ')}</span>
      </div>
      <div class="place-actions">
        <button class="icon-btn" onclick="toggleEdit('${place.id}')">✎ Edytuj</button>
        <button class="icon-btn del" onclick="removePlace('${place.id}')">✕ Usuń</button>
      </div>
    </div>
    <div class="edit-form" id="editform_${place.id}">
      <div class="field"><label>Nazwa</label><input type="text" id="ename_${place.id}" value="${place.name}" maxlength="40"></div>
      <div class="field"><label>Żółty (min)</label><input type="number" id="eyellow_${place.id}" value="${yMin||''}" min="0" max="9999" placeholder="0=brak"></div>
      <div class="field"><label>Zielony (min)</label><input type="number" id="egreen_${place.id}" value="${gMin}" min="1" max="9999"></div>
      <div class="field"><label>Kanały</label><input type="number" id="echannels_${place.id}" value="${place.channels}" min="1" max="20"></div>
      <button class="icon-btn save" onclick="saveEdit('${place.id}')">✔ Zapisz</button>
      <button class="icon-btn" onclick="toggleEdit('${place.id}')">Anuluj</button>
    </div>
    <div class="ch-grid" id="chgrid_${place.id}"></div>
  `;
  document.getElementById('main').appendChild(card);
  buildChannels(place);
}

function buildChannels(place) {
  const grid = document.getElementById('chgrid_'+place.id);
  if (!grid) return;
  grid.innerHTML = '';
  for (let ch = 1; ch <= place.channels; ch++) {
    const key = place.id+'_ch'+ch;
    const sec = customTimers[key] || 0;
    const div = document.createElement('div');
    div.className = 'timer-card st-grey'; div.id = 'tc_'+key;
    div.innerHTML = `
      <div class="timer-name">Kanał ${ch}</div>
      <div class="timer-display" id="td_${key}">00:00:00</div>
      <div class="timer-btns">
        <button class="btn start" onclick="startCh('${place.id}',${ch})">Start</button>
        <button class="btn stop"  onclick="stopCh('${place.id}',${ch})">Stop</button>
        <button class="btn"       onclick="resetCh('${place.id}',${ch})">Reset</button>
      </div>
    `;
    grid.appendChild(div);
    if (sec > 0) updateCard(key, sec, place);
  }
}

/* SOCKET EVENTS */
socket.on('placesUpdate', data => {
  places = data;
  // remove deleted
  document.querySelectorAll('.place-card').forEach(el => {
    if (!places.find(p => p.id === el.id.replace('place_',''))) el.remove();
  });
  // build/rebuild
  places.forEach(p => buildPlaceCard(p));

  document.getElementById('emptyState').style.display = places.length ? 'none' : 'block';
  document.getElementById('placeCount').innerText = places.length+' / 10';
  document.getElementById('addPlaceBtn').disabled = places.length >= 10;

  // apply current timer values
  applyTimers();
});

socket.on('customTimersUpdate', data => {
  customTimers = data;
  applyTimers();
});

function applyTimers() {
  for (const place of places) {
    for (let ch = 1; ch <= place.channels; ch++) {
      const key = place.id+'_ch'+ch;
      const sec = customTimers[key] || 0;
      updateCard(key, sec, place);
    }
  }
}
</script>

<script src="/auth.js"></script>
<script>requireAuth();</script>
</body>
</html>
