<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skarbiec Gildii</title>
<script src="/socket.io/socket.io.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:#c9a84c; --gold-light:#f0d080; --gold-dark:#7a5f1e;
    --bg:#090806; --border:#3a2e1a; --text:#d4c4a0; --text-dim:#7a6a50;
    --green:#2a6a35; --green-bright:#60e080;
    --red:#6a2020; --red-bright:#ff6060;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Crimson Text',serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .bg-layer{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 40% at 50% 0%,rgba(201,168,76,0.08) 0%,transparent 60%),#090806;}

  /* AUTH */
  .auth-overlay{position:fixed;inset:0;z-index:1000;background:rgba(5,4,3,0.95);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);transition:opacity 0.4s;}
  .auth-overlay.hidden{opacity:0;pointer-events:none;}
  .auth-box{position:relative;background:linear-gradient(160deg,#1e1810,#100d08);border:1px solid var(--gold-dark);border-radius:4px;padding:40px 44px;width:360px;text-align:center;box-shadow:0 0 80px rgba(0,0,0,0.9),0 0 40px rgba(201,168,76,0.08);}
  .auth-box::before,.auth-box::after{content:'';position:absolute;width:18px;height:18px;border-color:rgba(201,168,76,0.5);border-style:solid;}
  .auth-box::before{top:8px;left:8px;border-width:1px 0 0 1px;}
  .auth-box::after{bottom:8px;right:8px;border-width:0 1px 1px 0;}
  .auth-logo{width:80px;height:80px;object-fit:contain;margin-bottom:16px;filter:drop-shadow(0 0 12px rgba(201,168,76,0.4));}
  .auth-title{font-family:'Cinzel',serif;font-size:13px;letter-spacing:4px;color:var(--gold-light);text-transform:uppercase;margin-bottom:6px;}
  .auth-sub{font-size:14px;color:var(--text-dim);font-style:italic;margin-bottom:24px;}
  .auth-input{width:100%;background:rgba(0,0,0,0.6);border:1px solid rgba(201,168,76,0.25);border-radius:2px;color:var(--text);font-family:'Cinzel',serif;font-size:16px;letter-spacing:4px;text-align:center;padding:12px 16px;outline:none;transition:border-color 0.25s,box-shadow 0.25s;margin-bottom:10px;}
  .auth-input:focus{border-color:rgba(201,168,76,0.6);box-shadow:0 0 16px rgba(201,168,76,0.1);}
  .auth-input.error{border-color:rgba(200,50,50,0.8);animation:shake 0.35s ease;}
  @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}60%{transform:translateX(8px);}}
  .auth-error{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:#cc4444;height:16px;margin-bottom:14px;}
  .auth-btn{width:100%;font-family:'Cinzel',serif;font-size:11px;letter-spacing:4px;text-transform:uppercase;padding:12px;background:rgba(201,168,76,0.1);border:1px solid rgba(201,168,76,0.4);border-radius:2px;color:var(--gold);cursor:pointer;transition:all 0.25s;}
  .auth-btn:hover{background:rgba(201,168,76,0.2);border-color:var(--gold);}

  /* TOPBAR */
  .topbar{position:relative;z-index:10;display:flex;align-items:center;justify-content:space-between;max-width:1200px;margin:0 auto;padding:14px 20px;border-bottom:1px solid var(--border);background:linear-gradient(to bottom,rgba(17,14,9,0.96),rgba(9,8,6,0.8));}
  .topbar-left{display:flex;align-items:center;gap:12px;}
  .page-title{font-family:'Cinzel',serif;font-size:18px;font-weight:600;color:var(--gold-light);letter-spacing:2px;text-shadow:0 0 20px rgba(201,168,76,0.4);}
  .nav-btn{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-dark);background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.25);border-radius:2px;padding:7px 14px;cursor:pointer;text-decoration:none;display:inline-block;transition:all 0.2s;}
  .nav-btn:hover{color:var(--gold);border-color:rgba(201,168,76,0.6);background:rgba(201,168,76,0.12);}

  /* MAIN */
  .main{position:relative;z-index:1;max-width:1200px;margin:24px auto 60px;padding:0 20px;display:grid;grid-template-columns:1fr 1fr;gap:24px;}
  @media(max-width:800px){.main{grid-template-columns:1fr;}}

  /* SUMMARY BAR */
  .summary{position:relative;z-index:1;max-width:1200px;margin:20px auto 0;padding:0 20px;}
  .summary-inner{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;background:rgba(17,14,9,0.7);border:1px solid var(--border);border-radius:3px;padding:16px 20px;}
  .summary-item{text-align:center;}
  .summary-label{font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;margin-bottom:6px;}
  .summary-value{font-family:'Cinzel',serif;font-size:22px;font-weight:600;color:var(--gold-light);letter-spacing:1px;}
  .summary-value.green{color:var(--green-bright);}
  .summary-value.red{color:var(--red-bright);}

  /* SECTION CARD */
  .section-card{background:linear-gradient(160deg,#1c1510,#0e0b07);border:1px solid var(--border);border-radius:3px;overflow:hidden;}
  .section-card::before{content:'';display:block;height:1px;background:linear-gradient(to right,transparent,rgba(201,168,76,0.2),transparent);}
  .section-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.3);}
  .section-title{font-family:'Cinzel',serif;font-size:12px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;}

  /* INWESTYCJE */
  .inv-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid rgba(58,46,26,0.3);transition:background 0.2s;}
  .inv-row:hover{background:rgba(201,168,76,0.03);}
  .inv-nick{font-family:'Cinzel',serif;font-size:13px;color:var(--gold-light);letter-spacing:1px;flex:1;}
  .inv-avatar{width:36px;height:36px;border-radius:50%;object-fit:cover;border:2px solid rgba(201,168,76,0.3);flex-shrink:0;}
  .profit-avatar{width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid rgba(201,168,76,0.3);margin:0 auto 10px;}
  .inv-amount{font-family:'Cinzel',serif;font-size:14px;color:var(--green-bright);letter-spacing:1px;min-width:90px;text-align:right;}
  .inv-edit{background:rgba(0,0,0,0.4);border:1px solid rgba(201,168,76,0.2);color:var(--text);font-family:'Cinzel',serif;font-size:13px;padding:4px 8px;border-radius:2px;outline:none;width:90px;text-align:right;}
  .inv-edit:focus{border-color:rgba(201,168,76,0.5);}
  .inv-save-btn{font-family:'Cinzel',serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:2px;cursor:pointer;border:1px solid rgba(201,168,76,0.3);color:var(--gold-dark);background:rgba(201,168,76,0.07);transition:all 0.2s;}
  .inv-save-btn:hover{color:var(--gold);border-color:rgba(201,168,76,0.6);}
  .inv-del-btn{font-size:11px;color:#804040;background:none;border:none;cursor:pointer;padding:3px 6px;transition:color 0.2s;}
  .inv-del-btn:hover{color:#ff6060;}

  /* ADD ROW */
  .add-row{display:flex;gap:8px;padding:12px 16px;align-items:center;}
  .add-input{flex:1;background:rgba(0,0,0,0.5);border:1px solid rgba(201,168,76,0.2);color:var(--text);font-family:'Crimson Text',serif;font-size:14px;padding:6px 10px;border-radius:2px;outline:none;transition:border-color 0.2s;}
  .add-input:focus{border-color:rgba(201,168,76,0.5);}
  .add-input.amount{width:110px;flex:none;font-family:'Cinzel',serif;text-align:right;}
  .add-btn{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;padding:7px 16px;border-radius:2px;cursor:pointer;border:1px solid rgba(201,168,76,0.3);color:var(--gold-dark);background:rgba(201,168,76,0.08);transition:all 0.2s;white-space:nowrap;}
  .add-btn:hover{color:var(--gold);border-color:rgba(201,168,76,0.6);background:rgba(201,168,76,0.16);}

  /* SPRZEDAŻ */
  .sp-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid rgba(58,46,26,0.3);}
  .sp-info{flex:1;min-width:0;}
  .sp-opis{font-size:14px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .sp-date{font-size:11px;color:var(--text-dim);margin-top:2px;}
  .sp-kwota{font-family:'Cinzel',serif;font-size:15px;color:var(--green-bright);letter-spacing:1px;flex-shrink:0;}
  .sp-del{font-size:11px;color:#804040;background:none;border:none;cursor:pointer;padding:3px 6px;transition:color 0.2s;flex-shrink:0;}
  .sp-del:hover{color:#ff6060;}
  .empty-info{padding:20px 16px;text-align:center;font-size:13px;color:var(--text-dim);font-style:italic;}

  /* PODZIAŁ ZYSKU */
  .profit-card{grid-column:1/-1;}
  .profit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;padding:14px 16px;}
  .profit-item{background:rgba(0,0,0,0.3);border:1px solid rgba(58,46,26,0.5);border-radius:3px;padding:12px 14px;text-align:center;}
  .profit-nick{font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:8px;}
  .profit-inv{font-size:12px;color:var(--text-dim);margin-bottom:4px;}
  .profit-zysk{font-family:'Cinzel',serif;font-size:16px;font-weight:600;letter-spacing:1px;}
  .profit-zysk.plus{color:var(--green-bright);}
  .profit-zysk.minus{color:var(--red-bright);}
  .profit-udz{font-size:11px;color:var(--text-dim);margin-top:3px;}
</style>
</head>
<body>
<div class="bg-layer"></div>

<!-- AUTH -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-box">
    <img class="auth-logo" src="/skarbiec_logo.png" alt="">
    <div class="auth-title">Skarbiec Gildii</div>
    <div class="auth-sub">Dostęp chroniony</div>
    <input class="auth-input" id="authInput" type="password" placeholder="••••••••" autocomplete="off">
    <div class="auth-error" id="authError"></div>
    <button class="auth-btn" onclick="submitPassword()">Wejdź</button>
  </div>
</div>

<div class="page-content locked" id="pageContent">

<div class="topbar">
  <div class="topbar-left">
    <a class="nav-btn" href="/">⬅ Powrót</a>
    <div class="page-title">⚜ Skarbiec Gildii</div>
  </div>
</div>

<!-- SUMMARY -->
<div class="summary">
  <div class="summary-inner">
    <div class="summary-item">
      <div class="summary-label">Łączne inwestycje</div>
      <div class="summary-value" id="sumInw">0,00 zł</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">Łączna sprzedaż</div>
      <div class="summary-value green" id="sumSp">0,00 zł</div>
    </div>
    <div class="summary-item">
      <div class="summary-label">Bilans</div>
      <div class="summary-value" id="sumBilans">0,00 zł</div>
    </div>
  </div>
</div>

<div class="main">

  <!-- INWESTYCJE -->
  <div class="section-card">
    <div class="section-header">
      <span class="section-title">💰 Inwestycje</span>
    </div>
    <div id="invList"></div>
    <div class="add-row">
      <input class="add-input" id="invNick" placeholder="Nick gracza..." maxlength="30">
      <button class="add-btn" onclick="addNick()">+ Dodaj</button>
    </div>
  </div>

  <!-- SPRZEDAŻ -->
  <div class="section-card">
    <div class="section-header">
      <span class="section-title">📦 Sprzedaż</span>
    </div>
    <div id="spList"></div>
    <div class="add-row" style="flex-wrap:wrap;gap:6px;">
      <input class="add-input" id="spOpis" placeholder="Co sprzedano..." maxlength="80" style="flex:1;min-width:140px;">
      <input class="add-input amount" id="spKwota" type="number" placeholder="0.00" min="0" step="0.01">
      <button class="add-btn" onclick="addSprzedaz()">+ Dodaj</button>
    </div>
  </div>

  <!-- PODZIAŁ ZYSKU -->
  <div class="section-card profit-card">
    <div class="section-header">
      <span class="section-title">⚖ Podział zysku</span>
      <span style="font-size:12px;color:var(--text-dim);font-style:italic;">proporcjonalnie do inwestycji</span>
    </div>
    <div class="profit-grid" id="profitGrid"></div>
  </div>

</div>
</div><!-- /page-content -->

<script>
const socket = io();

/* AUTH */
const authOverlay = document.getElementById('authOverlay');
const pageContent  = document.getElementById('pageContent');
const authInput    = document.getElementById('authInput');
const authError    = document.getElementById('authError');

if (localStorage.getItem('auth_skarbiec') === '1') unlock();
authInput.addEventListener('keydown', e => { if (e.key === 'Enter') submitPassword(); });
setTimeout(() => authInput.focus(), 100);

function submitPassword() {
  socket.emit('checkPassword', authInput.value, ok => {
    if (ok) { localStorage.setItem('auth_skarbiec','1'); unlock(); }
    else {
      authInput.classList.add('error');
      authError.innerText = 'Nieprawidłowe hasło';
      setTimeout(() => { authInput.classList.remove('error'); authError.innerText = ''; authInput.value = ''; authInput.focus(); }, 1500);
    }
  });
}
function unlock() {
  authOverlay.classList.add('hidden');
  pageContent.classList.remove('locked');
  setTimeout(() => { authOverlay.style.display = 'none'; }, 400);
}


const AVATARS = {
  'Judaszek': '/avatar_judaszek.png',
  'Bieluch':  '/avatar_bieluch.png',
  'Ezvay':    '/avatar_ezvay.png',
  'Marco':    '/avatar_marco.png',
  'Yodasz':   '/avatar_yodasz.png',
};
function getAvatar(nick) {
  return AVATARS[nick] || '';
}

/* FORMAT */
function fmt(v) {
  return v.toLocaleString('pl-PL', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' zł';
}
function fmtDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('pl-PL') + ' ' + d.toLocaleTimeString('pl-PL', { hour:'2-digit', minute:'2-digit' });
}

/* STATE */
let data = { inwestycje: {}, sprzedaz: [] };

/* INWESTYCJE */
function renderInwestycje() {
  const list = document.getElementById('invList');
  const nicks = Object.keys(data.inwestycje);
  if (nicks.length === 0) {
    list.innerHTML = '<div class="empty-info">Brak graczy — dodaj poniżej</div>';
    return;
  }
  list.innerHTML = nicks.map(nick => {
    const kwota = data.inwestycje[nick] || 0;
    const av = getAvatar(nick);
    return `<div class="inv-row">
      ${av ? `<img class="inv-avatar" src="${av}">` : ''}
      <span class="inv-nick">${nick}</span>
      <input class="inv-edit" id="inv_${nick}" type="number" value="${kwota}" min="0" step="0.01">
      <button class="inv-save-btn" onclick="saveInwestycja('${nick}')">Zapisz</button>
      <span class="inv-amount">${fmt(kwota)}</span>
      <button class="inv-del-btn" onclick="delNick('${nick}')">✕</button>
    </div>`;
  }).join('');
}

function saveInwestycja(nick) {
  const val = parseFloat(document.getElementById('inv_' + nick)?.value) || 0;
  socket.emit('skarbiecSetInwestycja', { nick, kwota: val });
}

function addNick() {
  const nick = document.getElementById('invNick').value.trim();
  if (!nick) return;
  socket.emit('skarbiecAddNick', nick);
  document.getElementById('invNick').value = '';
}

function delNick(nick) {
  if (!confirm('Usunąć gracza ' + nick + ' z listy inwestycji?')) return;
  socket.emit('skarbiecRemoveNick', nick);
}

/* SPRZEDAŻ */
function renderSprzedaz() {
  const list = document.getElementById('spList');
  const items = data.sprzedaz || [];
  if (items.length === 0) {
    list.innerHTML = '<div class="empty-info">Brak wpisów sprzedaży</div>';
    return;
  }
  list.innerHTML = items.map(sp => `
    <div class="sp-row">
      <div class="sp-info">
        <div class="sp-opis">${sp.opis}</div>
        <div class="sp-date">${fmtDate(sp.ts)}</div>
      </div>
      <span class="sp-kwota">+${fmt(sp.kwota)}</span>
      <button class="sp-del" onclick="delSprzedaz('${sp.id}')">✕</button>
    </div>`).join('');
}

function addSprzedaz() {
  const opis  = document.getElementById('spOpis').value.trim();
  const kwota = parseFloat(document.getElementById('spKwota').value) || 0;
  if (!opis || kwota <= 0) return;
  socket.emit('skarbiecAddSprzedaz', { opis, kwota });
  document.getElementById('spOpis').value  = '';
  document.getElementById('spKwota').value = '';
}

function delSprzedaz(id) {
  if (!confirm('Usunąć ten wpis sprzedaży?')) return;
  socket.emit('skarbiecRemoveSprzedaz', id);
}

/* PODZIAŁ ZYSKU */
function renderProfit() {
  const nicks  = Object.keys(data.inwestycje);
  const sumInw = nicks.reduce((s, n) => s + (data.inwestycje[n]||0), 0);
  const sumSp  = (data.sprzedaz||[]).reduce((s, sp) => s + sp.kwota, 0);
  const bilans = sumSp - sumInw;

  document.getElementById('sumInw').innerText    = fmt(sumInw);
  document.getElementById('sumSp').innerText     = fmt(sumSp);
  const bil = document.getElementById('sumBilans');
  bil.innerText   = fmt(bilans);
  bil.className   = 'summary-value ' + (bilans >= 0 ? 'green' : 'red');

  const grid = document.getElementById('profitGrid');
  if (nicks.length === 0) { grid.innerHTML = '<div class="empty-info" style="grid-column:1/-1">Dodaj graczy do inwestycji</div>'; return; }

  grid.innerHTML = nicks.map(nick => {
    const inv    = data.inwestycje[nick] || 0;
    const udzial = sumInw > 0 ? inv / sumInw : (1 / nicks.length);
    const zysk   = sumSp * udzial;
    const netto  = zysk - inv;
    const pct    = (udzial * 100).toFixed(1);
    return `<div class="profit-item">
      ${getAvatar(nick) ? `<img class="profit-avatar" src="${getAvatar(nick)}">` : ''}
      <div class="profit-nick">${nick}</div>
      <div class="profit-inv">Inwestycja: ${fmt(inv)}</div>
      <div class="profit-inv">Udział ze sprzedaży: ${fmt(zysk)}</div>
      <div class="profit-zysk ${netto >= 0 ? 'plus' : 'minus'}">${netto >= 0 ? '+' : ''}${fmt(netto)}</div>
      <div class="profit-udz">${pct}% puli</div>
    </div>`;
  }).join('');
}

function render() {
  renderInwestycje();
  renderSprzedaz();
  renderProfit();
}

/* SOCKET */
socket.on('skarbiecUpdate', d => {
  data = d;
  render();
});

/* Enter w polach */
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    if (document.activeElement.id === 'invNick')  addNick();
    if (document.activeElement.id === 'spOpis' || document.activeElement.id === 'spKwota') addSprzedaz();
  }
});
</script>

<style>
  .page-content{transition:opacity 0.4s;}
  .page-content.locked{opacity:0;pointer-events:none;user-select:none;}
</style>
</body>
</html>
