<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grota Wygnańców</title>
<script src="/socket.io/socket.io.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold:#c9a84c; --gold-light:#f0d080; --gold-dark:#7a5f1e;
    --bg:#090806; --border:#3a2e1a; --text:#d4c4a0; --text-dim:#7a6a50;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Crimson Text',serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
  .bg-layer{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 40% at 50% 0%,rgba(40,20,80,0.15) 0%,transparent 60%),#090806;}

  /* TOP BAR */
  .topbar{
    position:relative;z-index:10;
    display:flex;align-items:center;justify-content:space-between;
    max-width:1500px;margin:0 auto;padding:12px 20px;
    border-bottom:1px solid var(--border);
    background:linear-gradient(to bottom,rgba(17,14,9,0.96),rgba(9,8,6,0.8));
  }
  .topbar-left{display:flex;align-items:center;gap:12px;}
  .page-title{font-family:'Cinzel',serif;font-size:18px;font-weight:600;color:var(--gold-light);letter-spacing:2px;text-shadow:0 0 20px rgba(201,168,76,0.4);}
  .nav-btn{
    font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;
    color:var(--gold-dark);background:rgba(201,168,76,0.06);
    border:1px solid rgba(201,168,76,0.25);border-radius:2px;
    padding:7px 14px;cursor:pointer;text-decoration:none;display:inline-block;transition:all 0.2s;
  }
  .nav-btn:hover{color:var(--gold);border-color:rgba(201,168,76,0.6);background:rgba(201,168,76,0.12);}

  /* HEATMAP TOGGLE */
  .heat-btn{
    font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;
    padding:7px 14px;border-radius:2px;cursor:pointer;transition:all 0.2s;
    border:1px solid rgba(255,160,40,0.3);color:#a06020;background:rgba(255,160,40,0.06);
  }
  .heat-btn.on{color:#ffb040;border-color:rgba(255,160,40,0.7);background:rgba(255,160,40,0.15);box-shadow:0 0 12px rgba(255,140,20,0.2);}

  /* LAYOUT */
  .layout{
    position:relative;z-index:1;
    display:flex;gap:0;
    max-width:1500px;margin:0 auto;
    min-height:calc(100vh - 57px);
  }

  /* MAP AREA */
  .map-wrap{flex:1;position:relative;padding:20px;min-width:0;display:flex;align-items:flex-start;justify-content:center;}
  .map-container{
    position:relative;display:inline-block;cursor:crosshair;
    border:1px solid rgba(201,168,76,0.2);border-radius:3px;
    box-shadow:0 0 40px rgba(0,0,0,0.8);
    max-width:100%;
  }
  .map-container img{display:block;height:auto;user-select:none;pointer-events:none;}
  .map-hint{
    position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
    font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;text-transform:uppercase;
    color:rgba(201,168,76,0.35);white-space:nowrap;pointer-events:none;
  }

  /* CANVAS HEATMAP — sits exactly over image */
  #heatCanvas{
    position:absolute;top:0;left:0;width:100%;height:100%;
    pointer-events:none;border-radius:3px;
    opacity:0;transition:opacity 0.4s;
  }
  #heatCanvas.visible{opacity:1;}

  /* PING MARKERS */
  #pingLayer{position:absolute;inset:0;z-index:5;pointer-events:none;}
  #generalLayer{position:absolute;inset:0;z-index:5;pointer-events:none;}
  .ping-marker{position:absolute;transform:translate(-50%,-50%);pointer-events:all;z-index:5;display:flex;flex-direction:column;align-items:center;}
  .ping-dot{
    width:14px;height:14px;position:relative;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:transform 0.15s,filter 0.15s;
    animation:ping-appear 0.3s cubic-bezier(0.23,1,0.32,1);
    filter:drop-shadow(0 0 4px rgba(255,80,40,0.9));
  }
  .ping-dot img{
    width:14px;height:14px;object-fit:contain;pointer-events:none;
  }
  .ping-dot:hover{
    transform:scale(1.3);
    filter:drop-shadow(0 0 7px rgba(255,120,40,1));
  }
  @keyframes ping-appear{0%{transform:scale(0);opacity:0;}70%{transform:scale(1.2);}100%{transform:scale(1);opacity:1;}}
  .ping-pulse{
    position:absolute;top:50%;left:50%;
    width:14px;height:14px;border-radius:50%;
    background:rgba(255,60,20,0.25);transform:translate(-50%,-50%);
    animation:pulse-ring 2s ease-out infinite;pointer-events:none;
  }
  @keyframes pulse-ring{0%{transform:translate(-50%,-50%) scale(1);opacity:0.8;}100%{transform:translate(-50%,-50%) scale(3);opacity:0;}}
  .ping-ch-badge{
    position:absolute;top:-14px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,0.92);
    border:1.5px solid var(--gold);border-radius:3px;
    font-family:'Cinzel',serif;font-size:11px;font-weight:600;
    color:#fff;padding:1px 5px;pointer-events:none;
    white-space:nowrap;line-height:1.5;
    text-shadow:0 0 6px rgba(201,168,76,0.8);
    box-shadow:0 0 6px rgba(0,0,0,0.8);
  }

  /* SIDEBAR */
  /* LEWY PANEL — historia zbitych */
  .left-panel{
    width:220px;flex-shrink:0;border-right:1px solid var(--border);
    background:rgba(8,6,4,0.6);display:flex;flex-direction:column;overflow:hidden;
    overflow-y:auto;
  }
  .lp-header{
    padding:10px 14px;border-bottom:1px solid var(--border);
    background:rgba(0,0,0,0.3);flex-shrink:0;
  }
  .lp-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;}
  .lp-undo{
    font-family:'Cinzel',serif;font-size:8px;letter-spacing:1px;text-transform:uppercase;
    padding:3px 8px;border-radius:2px;cursor:pointer;
    border:1px solid rgba(201,168,76,0.25);color:var(--text-dim);background:rgba(201,168,76,0.05);
    transition:all 0.2s;margin-top:6px;width:100%;
  }
  .lp-undo:hover{color:var(--gold);border-color:rgba(201,168,76,0.5);}

  /* LICZNIKI KANAŁÓW */
  .ch-counters{display:grid;grid-template-columns:repeat(4,1fr);gap:3px;padding:6px 8px;border-bottom:1px solid var(--border);flex-shrink:0;}
  .ch-counter{
    display:flex;flex-direction:column;align-items:center;padding:5px 2px;
    border-radius:3px;border:1px solid rgba(58,46,26,0.4);background:rgba(0,0,0,0.2);
    cursor:pointer;transition:all 0.15s;
  }
  .ch-counter:hover{border-color:rgba(201,168,76,0.3);}
  .ch-num{font-family:'Cinzel',serif;font-size:9px;color:var(--text-dim);letter-spacing:1px;}
  .ch-avail{font-family:'Cinzel',serif;font-size:14px;font-weight:600;line-height:1;}
  .ch-avail.full{color:#60e080;}
  .ch-avail.mid{color:#e0c040;}
  .ch-avail.low{color:#e06040;}
  .ch-avail.empty{color:#804040;}
  .ch-sub{font-size:9px;color:var(--text-dim);}

  /* HISTORIA ZBITYCH */
  .lp-body{flex:1;overflow-y:auto;}
  .dead-ch-group{border-bottom:1px solid rgba(30,22,10,0.5);}
  .dead-ch-label{
    padding:4px 10px;font-family:'Cinzel',serif;font-size:8px;
    letter-spacing:2px;color:var(--gold-dark);text-transform:uppercase;
    background:rgba(0,0,0,0.2);display:flex;justify-content:space-between;align-items:center;
    position:sticky;top:0;z-index:2;
  }
  .dead-row{
    display:flex;align-items:center;gap:8px;padding:6px 10px;
    border-bottom:1px solid rgba(30,22,10,0.3);
  }
  .dead-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#604040;}
  .dead-info{flex:1;}
  .dead-time{font-family:'Cinzel',serif;font-size:12px;letter-spacing:1px;}
  .dead-time.fresh{color:var(--text-dim);}
  .dead-time.yellow{color:#e0c040;}
  .dead-time.green{color:#60e080;}
  .dead-label{font-size:10px;color:var(--text-dim);margin-top:1px;}

  .sidebar{
    width:270px;flex-shrink:0;border-left:1px solid var(--border);
    background:rgba(12,10,7,0.7);display:flex;flex-direction:column;
    max-height:calc(100vh - 57px);overflow-y:auto;
  }
  .sidebar-section{padding:12px 14px;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.25);}
  .sidebar-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:2px;}
  .sidebar-sub{font-size:12px;color:var(--text-dim);font-style:italic;}
  .sidebar-empty{padding:24px 16px;text-align:center;font-size:13px;color:var(--text-dim);font-style:italic;}

  /* PING LIST ITEM */
  .ping-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(58,46,26,0.4);transition:background 0.2s;}
  .ping-item:hover{background:rgba(201,168,76,0.04);}
  .ping-dot-small{
    width:32px;height:32px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    filter:drop-shadow(0 0 5px rgba(255,80,30,0.7));
  }
  .ping-dot-small img{width:32px;height:32px;object-fit:contain;}
  .ping-info{flex:1;min-width:0;}
  .ping-ch{font-family:'Cinzel',serif;font-size:11px;color:var(--gold-light);letter-spacing:1px;}
  .ping-time{font-family:'Cinzel',serif;font-size:13px;color:#ff9090;margin-top:2px;letter-spacing:1px;}
  .ping-remove{
    font-size:9px;color:#804040;background:none;
    font-family:'Cinzel',serif;letter-spacing:1px;padding:4px 8px;
    border:1px solid rgba(180,50,50,0.2);border-radius:2px;cursor:pointer;transition:all 0.2s;
  }
  .ping-remove:hover{color:#ff6060;border-color:rgba(200,60,60,0.6);background:rgba(140,30,30,0.15);}

  /* HOTSPOT INFO (sidebar) */
  .hotspot-section{padding:10px 14px;border-bottom:1px solid rgba(58,46,26,0.4);}
  .hotspot-title{font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;color:#ffb040;text-transform:uppercase;margin-bottom:6px;}
  .hotspot-item{
    display:flex;align-items:center;gap:8px;padding:5px 0;
    font-family:'Cinzel',serif;font-size:10px;letter-spacing:1px;
  }
  .hotspot-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .hotspot-count{color:var(--text-dim);font-size:11px;}

  /* POPUP */
  /* MODE TOGGLE */
  .mode-bar{display:flex;gap:8px;align-items:center;}
  .mode-btn{
    font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;
    padding:6px 14px;border-radius:2px;cursor:pointer;transition:all 0.2s;
    border:1px solid rgba(201,168,76,0.2);color:var(--text-dim);background:rgba(255,255,255,0.03);
  }
  .mode-btn.active-metin  {color:#ff8060;border-color:rgba(255,100,60,0.6);background:rgba(180,50,20,0.15);}
  .mode-btn.active-general{color:#60b0ff;border-color:rgba(60,140,255,0.6);background:rgba(20,60,180,0.15);}

  /* GENERAL MARKER */
  .general-marker{position:absolute;transform:translate(-50%,-50%);pointer-events:all;z-index:5;display:flex;flex-direction:column;align-items:center;}
  .general-dot{
    position:relative;display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:transform 0.15s,filter 0.15s;
    animation:ping-appear 0.3s cubic-bezier(0.23,1,0.32,1);
    filter:drop-shadow(0 0 5px rgba(60,140,255,0.9));
  }
  .general-dot img{object-fit:contain;pointer-events:none;}
  .general-dot:hover{transform:scale(1.3);filter:drop-shadow(0 0 9px rgba(100,180,255,1));}
  .general-pulse{
    position:absolute;top:50%;left:50%;border-radius:50%;
    background:rgba(60,140,255,0.2);transform:translate(-50%,-50%);
    animation:pulse-ring 2s ease-out infinite;pointer-events:none;
  }
  .general-ch-badge{
    position:absolute;top:-14px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,20,0.92);border:1.5px solid #60b0ff;border-radius:3px;
    font-family:'Cinzel',serif;font-size:11px;font-weight:600;
    color:#a0d0ff;padding:1px 5px;pointer-events:none;
    white-space:nowrap;line-height:1.5;text-shadow:0 0 6px rgba(60,140,255,0.8);
    box-shadow:0 0 6px rgba(0,0,0,0.8);
  }

  /* GENERAL SIDEBAR ITEM */
  .general-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid rgba(30,60,120,0.4);transition:background 0.2s;}
  .general-item:hover{background:rgba(60,140,255,0.05);}
  .general-dot-small{width:32px;height:32px;flex-shrink:0;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 0 5px rgba(60,140,255,0.7));}
  .general-dot-small img{width:32px;height:32px;object-fit:contain;}
  .general-ch{font-family:'Cinzel',serif;font-size:11px;color:#a0d0ff;letter-spacing:1px;}
  .general-time{font-family:'Cinzel',serif;font-size:13px;color:#6090d0;margin-top:2px;letter-spacing:1px;}
  .general-remove{font-size:9px;color:#304060;background:none;font-family:'Cinzel',serif;letter-spacing:1px;padding:4px 8px;border:1px solid rgba(60,100,180,0.2);border-radius:2px;cursor:pointer;transition:all 0.2s;}
  .general-remove:hover{color:#60b0ff;border-color:rgba(60,140,255,0.6);background:rgba(20,60,140,0.15);}

  /* SIDEBAR SECTIONS */
  .sidebar-section-title{
    padding:8px 14px;font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;
    text-transform:uppercase;color:var(--text-dim);background:rgba(0,0,0,0.2);
    border-bottom:1px solid var(--border);border-top:1px solid var(--border);
    display:flex;justify-content:space-between;align-items:center;
  }
  .sidebar-section-title.blue{color:#6090d0;border-color:rgba(60,100,180,0.3);}

  /* SNAPSHOT PANEL */
  .snap-panel{padding:10px 14px;border-bottom:1px solid var(--border);}
  .snap-save-row{display:flex;gap:6px;margin-bottom:8px;}
  .snap-input{
    flex:1;background:rgba(0,0,0,0.5);border:1px solid rgba(201,168,76,0.2);
    color:var(--text);font-family:'Crimson Text',serif;font-size:13px;
    padding:5px 8px;border-radius:2px;outline:none;
  }
  .snap-input:focus{border-color:rgba(201,168,76,0.5);}
  .snap-save-btn{
    font-family:'Cinzel',serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;
    padding:5px 12px;border-radius:2px;cursor:pointer;transition:all 0.2s;
    border:1px solid rgba(201,168,76,0.3);color:var(--gold-dark);background:rgba(201,168,76,0.07);
    white-space:nowrap;
  }
  .snap-save-btn:hover{color:var(--gold);border-color:var(--gold);background:rgba(201,168,76,0.16);}
  .snap-item{
    display:flex;align-items:center;gap:8px;padding:6px 0;
    border-bottom:1px solid rgba(58,46,26,0.3);
  }
  .snap-info{flex:1;min-width:0;}
  .snap-name{font-family:'Cinzel',serif;font-size:11px;color:var(--gold-light);letter-spacing:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .snap-meta{font-size:11px;color:var(--text-dim);font-style:italic;margin-top:1px;}
  .snap-load-btn{
    font-family:'Cinzel',serif;font-size:9px;letter-spacing:1px;text-transform:uppercase;
    padding:4px 8px;border-radius:2px;cursor:pointer;transition:all 0.2s;
    border:1px solid rgba(201,168,76,0.25);color:var(--text-dim);background:rgba(201,168,76,0.05);
  }
  .snap-load-btn:hover{color:var(--gold);border-color:rgba(201,168,76,0.6);}
  .snap-del-btn{
    font-size:10px;color:#804040;background:none;border:none;cursor:pointer;padding:3px 5px;transition:color 0.2s;
  }
  .snap-del-btn:hover{color:#ff6060;}

  .popup-overlay{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.5);}
  .popup-overlay.hidden{display:none;}
  .popup-box{
    background:linear-gradient(160deg,#1e1810,#100d08);
    border:1px solid var(--gold-dark);border-radius:4px;
    padding:28px 32px;min-width:280px;text-align:center;
    box-shadow:0 0 60px rgba(0,0,0,0.9),0 0 30px rgba(201,168,76,0.07);
    position:relative;
  }
  .popup-box::before,.popup-box::after{content:'';position:absolute;width:14px;height:14px;border-color:rgba(201,168,76,0.5);border-style:solid;}
  .popup-box::before{top:7px;left:7px;border-width:1px 0 0 1px;}
  .popup-box::after{bottom:7px;right:7px;border-width:0 1px 1px 0;}
  .popup-title{font-family:'Cinzel',serif;font-size:12px;letter-spacing:3px;color:var(--gold);text-transform:uppercase;margin-bottom:6px;}
  .popup-sub{font-size:13px;color:var(--text-dim);font-style:italic;margin-bottom:20px;}
  .ch-buttons{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:16px;}
  .ch-btn{
    font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px;
    width:44px;height:44px;border-radius:3px;cursor:pointer;transition:all 0.2s;
    border:1px solid rgba(201,168,76,0.3);color:var(--gold-dark);background:rgba(201,168,76,0.07);
  }
  .ch-btn:hover{color:var(--gold-light);border-color:var(--gold);background:rgba(201,168,76,0.2);transform:scale(1.08);box-shadow:0 0 12px rgba(201,168,76,0.2);}
  .popup-cancel{
    font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;text-transform:uppercase;
    color:var(--text-dim);background:none;border:1px solid rgba(255,255,255,0.08);
    border-radius:2px;padding:7px 20px;cursor:pointer;transition:all 0.2s;width:100%;
  }
  .popup-cancel:hover{color:var(--text);border-color:rgba(255,255,255,0.2);}
</style>
</head>
<body>
<div class="bg-layer"></div>

<!-- POPUP -->
<div class="popup-overlay hidden" id="popup">
  <div class="popup-box">
    <div class="popup-title">Pinguj Metina</div>
    <div class="popup-sub">Wybierz kanał</div>
    <div class="ch-buttons" id="chButtons"></div>
    <button class="popup-cancel" onclick="closePopup()">Anuluj</button>
  </div>
</div>

<div class="topbar">
  <div class="topbar-left">
    <a class="nav-btn" href="/">⬅ Powrót</a>
    <div class="page-title">Grota Wygnańców</div>
  </div>
  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
    <div class="mode-bar">
      <button class="mode-btn active-metin" id="btnMetin"   onclick="setMode('metin')">⚔ Metin</button>
      <button class="mode-btn"              id="btnGeneral" onclick="setMode('general')">🔵 Generał</button>
    </div>
    <div class="vol-wrap">
      <span style="font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;">Mapa</span>
      <input type="range" id="mapSize" min="30" max="100" step="1" style="width:80px;">
      <span style="font-family:'Cinzel',serif;font-size:11px;color:var(--gold-dark);min-width:28px;text-align:right;" id="mapSizeVal">100%</span>
    </div>
    <div class="vol-wrap">
      <span style="font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;">Pingi</span>
      <input type="range" id="pingSize" min="6" max="40" step="1" style="width:80px;">
      <span style="font-family:'Cinzel',serif;font-size:11px;color:var(--gold-dark);min-width:24px;text-align:right;" id="pingSizeVal">14</span>
    </div>
    <button class="heat-btn" id="heatBtn" onclick="toggleHeat()">🔥 Heatmapa OFF</button>
    <button class="heat-btn" id="routeBtn" onclick="toggleRoute()" style="background:rgba(60,140,255,0.1);border-color:rgba(60,140,255,0.3);color:#80b0ff;">🗺 Trasa OFF</button>
  </div>
</div>

<div class="layout">

  <!-- LEWY PANEL -->
  <div class="left-panel">
    <div class="lp-header">
      <div class="lp-title">⚔ Historia zbitych</div>
      <button class="lp-undo" onclick="undoLastKill()">↩ Cofnij ostatnie</button>
    </div>
    <div class="ch-counters" id="chCounters"></div>
    <div class="lp-body" id="deadList"></div>
  </div>

  <div class="map-wrap">
    <div class="map-container" id="mapContainer">
      <img src="/grota_mapa.png" id="mapImg" alt="Mapa Groty" draggable="false">
      <canvas id="heatCanvas"></canvas>
      <canvas id="routeCanvas" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:2;"></canvas>
      <div id="pingLayer"></div>
      <div id="generalLayer"></div>
      <div class="map-hint" id="mapHint">Kliknij na mapę aby pingować metina</div>
    </div>
  </div>

  <div class="sidebar">
    <!-- SNAPSHOTS -->
    <div class="snap-panel">
      <div style="font-family:'Cinzel',serif;font-size:9px;letter-spacing:3px;color:var(--gold-dark);text-transform:uppercase;margin-bottom:8px;">📸 Snapshoty</div>
      <div class="snap-save-row">
        <input class="snap-input" id="snapNameInput" placeholder="Nazwa snapshotu...">
        <button class="snap-save-btn" onclick="saveSnapshot()">Zapisz</button>
      </div>
      <div id="snapList"></div>
    </div>

    <div class="sidebar-section-title">⚔ Metiny</div>
    <div id="pingList"><div class="sidebar-empty">Brak aktywnych pingów</div></div>

    <div class="sidebar-section-title blue">🔵 Generałowie</div>
    <div id="generalList"><div class="sidebar-empty">Brak aktywnych generałów</div></div>

    <div class="hotspot-section" id="hotspotSection" style="display:none">
      <div class="hotspot-title">🔥 Gorące miejsca</div>
      <div id="hotspotList"></div>
    </div>
  </div>

</div>

<script>
const socket = io();

/* PING SIZE */
let pingSize   = parseInt(localStorage.getItem('pingSize')) || 14;
let mapSizePct = parseInt(localStorage.getItem('mapSize'))  || 100;

function applyPingSize() {
  const sz = pingSize + 'px';
  document.querySelectorAll('.ping-dot').forEach(el => {
    el.style.width = sz; el.style.height = sz;
  });
  document.querySelectorAll('.ping-dot img').forEach(el => {
    el.style.width = sz; el.style.height = sz;
  });
  document.querySelectorAll('.ping-pulse').forEach(el => {
    el.style.width = sz; el.style.height = sz;
  });
}

/* STATE */
let pings    = {};
let generals = {};
let snapshots = [];
let history  = [];
let heatOn   = localStorage.getItem('heat') === '1';
let pingMode = 'metin'; // 'metin' | 'general'
let pendingClick = null;
let timerRafs = {};
let generalRafs = {};

/* MAP ELEMENTS */
const mapContainer  = document.getElementById('mapContainer');
const mapImg        = document.getElementById('mapImg');
const pingLayer     = document.getElementById('pingLayer');
const generalLayer  = document.getElementById('generalLayer');
const heatCanvas    = document.getElementById('heatCanvas');
const heatCtx       = heatCanvas.getContext('2d');
const heatBtn       = document.getElementById('heatBtn');

/* SLIDERS INIT — po deklaracji elementów DOM */
(function() {
  const pingSizeSlider = document.getElementById('pingSize');
  const pingSizeVal    = document.getElementById('pingSizeVal');
  const mapSizeSlider  = document.getElementById('mapSize');
  const mapSizeValEl   = document.getElementById('mapSizeVal');

  pingSizeSlider.value = pingSize;
  pingSizeVal.innerText = pingSize;
  pingSizeSlider.oninput = () => {
    pingSize = parseInt(pingSizeSlider.value);
    pingSizeVal.innerText = pingSize;
    localStorage.setItem('pingSize', pingSize);
    applyPingSize();
  };

  mapSizeSlider.value = mapSizePct;
  mapSizeValEl.innerText = mapSizePct + '%';
  applyMapSize();
  mapSizeSlider.oninput = () => {
    mapSizePct = parseInt(mapSizeSlider.value);
    mapSizeValEl.innerText = mapSizePct + '%';
    localStorage.setItem('mapSize', mapSizePct);
    applyMapSize();
  };
})();

function applyMapSize() {
  mapImg.style.width = Math.round(1080 * mapSizePct / 100) + 'px';
  if (heatOn) syncCanvas();
  if (routeOn) drawRoute();
}

function setMode(mode) {
  pingMode = mode;
  document.getElementById('btnMetin').className   = 'mode-btn' + (mode==='metin'   ? ' active-metin'   : '');
  document.getElementById('btnGeneral').className = 'mode-btn' + (mode==='general' ? ' active-general' : '');
  document.getElementById('mapHint').innerText = mode === 'metin'
    ? 'Kliknij na mapę aby pingować metina'
    : 'Kliknij na mapę aby oznaczyć generała';
  mapContainer.style.cursor = mode === 'general' ? 'crosshair' : 'crosshair';
}

/* Apply initial heat state */
updateHeatBtn();

/* Click on map */
mapContainer.addEventListener('click', e => {
  if (e.target.closest('.ping-dot') || e.target.closest('.general-dot')) return;
  const rect = mapImg.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const y = (e.clientY - rect.top)  / rect.height;
  if (x < 0 || x > 1 || y < 0 || y > 1) return;
  pendingClick = { x, y };
  openPopup();
});

/* POPUP */
const popup    = document.getElementById('popup');
const chBtns   = document.getElementById('chButtons');
const MAX_CH   = 8;

function openPopup() {
  chBtns.innerHTML = '';
  for (let i = 1; i <= MAX_CH; i++) {
    const btn = document.createElement('button');
    btn.className = 'ch-btn'; btn.innerText = i;
    btn.onclick = () => confirmPing(i);
    chBtns.appendChild(btn);
  }
  // Update popup style by mode
  const titleEl = popup.querySelector('.popup-title');
  const subEl   = popup.querySelector('.popup-sub');
  if (pingMode === 'general') {
    titleEl.innerHTML = '🔵 Oznacz Generała';
    titleEl.style.color = '#a0d0ff';
    subEl.innerText = 'Wybierz kanał';
  } else {
    titleEl.innerHTML = '⚔ Pinguj Metina';
    titleEl.style.color = '';
    subEl.innerText = 'Wybierz kanał';
  }
  popup.classList.remove('hidden');
}
function closePopup() { popup.classList.add('hidden'); pendingClick = null; }
popup.addEventListener('click', e => { if (e.target === popup) closePopup(); });

function confirmPing(ch) {
  if (!pendingClick) return;
  if (pingMode === 'general') {
    socket.emit('grotaAddGeneral', { x: pendingClick.x, y: pendingClick.y, ch });
  } else {
    socket.emit('grotaAddPing', { x: pendingClick.x, y: pendingClick.y, ch });
  }
  closePopup();
}

/* Popup title updates by mode */
const origOpenPopup = openPopup;

/* FORMAT */
function fmt(ms) {
  const s = Math.floor(ms / 1000);
  const h = Math.floor(s / 3600);
  const m = Math.floor((s % 3600) / 60);
  const ss = s % 60;
  if (h > 0) return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}

/* RENDER PINGS */
function renderPings() {
  for (const id in timerRafs) cancelAnimationFrame(timerRafs[id]);
  timerRafs = {};

  const ids = Object.keys(pings);

    for (const id of ids) { placeMarker(pings[id]); addSidebarItem(pings[id]); startTicking(pings[id]); }

  m.style.top  = (p.y * 100) + '%';
  const sz = pingSize + 'px';
  m.innerHTML = `
    <div class="ping-dot" onclick="removePing('${p.id}')" title="Kliknij aby usunąć (zbity)"
         style="width:${sz};height:${sz}">
      <div class="ping-pulse" style="width:${sz};height:${sz}"></div>
      <img src="/metin_icon.png" alt="metin" style="width:${sz};height:${sz}">
      <div class="ping-ch-badge">${p.ch}</div>
    </div>`;
  pingLayer.appendChild(m);
}

function addSidebarItem(p) {

  item.className = 'ping-item'; item.id = 'sitem_' + p.id;
  item.innerHTML = `
    <div class="ping-dot-small"><img src="/metin_icon.png" alt="metin"></div>
    <div class="ping-info">
      <div class="ping-ch">CH ${p.ch}</div>
      <div class="ping-time" id="st_${p.id}">00:00</div>
    </div>
    <button class="ping-remove" onclick="removePing('${p.id}')">✕ Zbity</button>`;
  document.getElementById('pingList').appendChild(item);
}

function startTicking(p) {
  function tick() {
    const str = fmt(Date.now() - p.startedAt);
    const st = document.getElementById('st_' + p.id);
    if (st) st.innerText = str;
    timerRafs[p.id] = requestAnimationFrame(tick);
  }
  timerRafs[p.id] = requestAnimationFrame(tick);
}

/* HISTORIA ZBITYCH */
// MAX_CH already defined above
const METIN_PER_CH = 6;
const YELLOW_MS = 20 * 60 * 1000;
const GREEN_MS  = 30 * 60 * 1000;
const EXPIRE_MS = 35 * 60 * 1000;

let deadHistory = []; // synchronizowane z serwerem
let undoStack = []; // tylko lokalnie — do cofania

function removePing(id) {
  const p = pings[id];
  if (p) {
    const dead = { id: 'dead_'+Date.now()+'_'+id, ch: p.ch, killedAt: Date.now(), x: p.x, y: p.y };
    undoStack.push({ ping: {...p}, dead });
    if (undoStack.length > 3) undoStack.shift();
    socket.emit('grotaAddDead', dead); // zapisz na serwerze
  }
  socket.emit('grotaRemovePing', id);
}

function undoLastKill() {
  if (!undoStack.length) return;
  const last = undoStack.pop();
  socket.emit('grotaRemoveDead', last.dead.id); // usuń z serwera
  socket.emit('grotaAddPing', { x: last.ping.x, y: last.ping.y, ch: last.ping.ch });
}

function renderChCounters() {
  const wrap = document.getElementById('chCounters');
  if (!wrap) return;
  // Policz zbite per ch (ostatnie 35 min)
  const now = Date.now();
  const deadPerCh = {};
  for (let i = 1; i <= MAX_CH; i++) deadPerCh[i] = 0;
  deadHistory.filter(d => now - d.killedAt < EXPIRE_MS).forEach(d => {
    if (d.ch >= 1 && d.ch <= MAX_CH)
      deadPerCh[d.ch]++;
  });

  wrap.innerHTML = '';
  for (let ch = 1; ch <= MAX_CH; ch++) {
    const dead   = deadPerCh[ch] || 0;
    const avail  = Math.max(0, METIN_PER_CH - dead);
    const cls    = avail >= 5 ? 'full' : avail >= 3 ? 'mid' : avail >= 1 ? 'low' : 'empty';
    const div    = document.createElement('div');
    div.className = 'ch-counter';
    div.title = `CH${ch}: ${avail} dostępnych, ${dead} zbitych`;
    div.innerHTML = `<div class="ch-num">CH${ch}</div>
      <div class="ch-avail ${cls}">${avail}</div>
      <div class="ch-sub">/${METIN_PER_CH}</div>`;
    wrap.appendChild(div);
  }
}

function renderDeadList() {
  const wrap = document.getElementById('deadList');
  if (!wrap) return;
  const now  = Date.now();

  // Wygasłe są czyszczone po stronie serwera przy połączeniu
  const activeHistory = deadHistory.filter(d => now - d.killedAt < EXPIRE_MS);

  if (!activeHistory.length) {
    wrap.innerHTML = '<div class="sidebar-empty" style="padding:20px 14px">Brak zbitych metinów</div>';
    renderChCounters();
    return;
  }

  // Grupuj po ch
  const byCh = {};
  activeHistory.forEach(d => { (byCh[d.ch] = byCh[d.ch]||[]).push(d); });

  wrap.innerHTML = '';
  Object.keys(byCh).sort((a,b)=>a-b).forEach(ch => {
    const grp = document.createElement('div');
    grp.className = 'dead-ch-group';
    const label = document.createElement('div');
    label.className = 'dead-ch-label';
    label.innerHTML = `<span>Kanał ${ch}</span><span style="color:var(--text-dim)">${byCh[ch].length} zbitych</span>`;
    grp.appendChild(label);

    byCh[ch].sort((a,b)=>b.killedAt-a.killedAt).forEach(d => {
      const elapsed = now - d.killedAt;
      const mins    = Math.floor(elapsed/60000);
      const secs    = Math.floor((elapsed%60000)/1000);
      const cls     = elapsed >= GREEN_MS ? 'green' : elapsed >= YELLOW_MS ? 'yellow' : 'fresh';
      const label2  = elapsed >= GREEN_MS ? '✓ Można szukać' : elapsed >= YELLOW_MS ? '⚡ Może być' : '✗ Świeżo zbity';

      const row = document.createElement('div');
      row.className = 'dead-row';
      row.id = 'dead_row_' + d.id;
      row.innerHTML = `
        <div class="dead-dot" style="background:${cls==='green'?'#409040':cls==='yellow'?'#908040':'#604040'}"></div>
        <div class="dead-info">
          <div class="dead-time ${cls}" id="dead_t_${d.id}">${mins}m ${secs}s temu</div>
          <div class="dead-label">${label2}</div>
        </div>`;
      grp.appendChild(row);
    });
    wrap.appendChild(grp);
  });

  renderChCounters();
}

// Tick co sekundę
setInterval(() => {
  renderDeadList();
}, 1000);

/* GENERALS */
function placeGeneral(g) {
  const m = document.createElement('div');
  m.className = 'general-marker'; m.id = 'gmarker_' + g.id;
  m.style.left = (g.x * 100) + '%';

function addGeneralSidebarItem(g) {

  item.className = 'general-item'; item.id = 'gitem_' + g.id;
  item.innerHTML = `
    <div class="general-dot-small"><img src="/metin_icon.png" alt="gen" style="filter:hue-rotate(180deg) saturate(1.5)"></div>
    <div class="ping-info">
      <div class="general-ch">CH ${g.ch}</div>
      <div class="general-time" id="gt_${g.id}">00:00</div>
    </div>
    <button class="general-remove" onclick="removeGeneral('${g.id}')">✕ Zbity</button>`;
  document.getElementById('generalList').appendChild(item);
}

function startGeneralTick(g) {
  function tick() {
    const el = document.getElementById('gt_' + g.id);
    if (el) el.innerText = fmt(Date.now() - g.startedAt);
    generalRafs[g.id] = requestAnimationFrame(tick);

}

function removeGeneral(id) { socket.emit('grotaRemoveGeneral', id); }

function renderGenerals() {
  for (const id in generalRafs) cancelAnimationFrame(generalRafs[id]);
  generalRafs = {};
  generalLayer.innerHTML = '';
  const list = document.getElementById('generalList');
  const ids = Object.keys(generals);
  if (ids.length === 0) {

/* SNAPSHOTS */
function saveSnapshot() {
  const name = document.getElementById('snapNameInput').value.trim() || 'Snapshot';
  socket.emit('grotaSaveSnapshot', { name });

}

function renderSnapshots() {
  const list = document.getElementById('snapList');
  if (!snapshots.length) { list.innerHTML = '<div style="font-size:12px;color:var(--text-dim);font-style:italic;padding:4px 0">Brak zapisanych snapshotów</div>'; return; }
  list.innerHTML = '';
  snapshots.forEach(snap => {
    const d = new Date(snap.ts);
    const time = d.toLocaleDateString('pl-PL',{day:'2-digit',month:'2-digit'}) + ' ' +
                 d.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});
    const metinCount   = Object.keys(snap.pings||{}).length;
    const generalCount = Object.keys(snap.generals||{}).length;
    const row = document.createElement('div');
    row.className = 'snap-item';
    row.innerHTML = `
      <div class="snap-info">
        <div class="snap-name">${snap.name}</div>

      </div>
      <button class="snap-load-btn" onclick="loadSnapshot('${snap.id}')">Wczytaj</button>
      <button class="snap-del-btn"  onclick="deleteSnapshot('${snap.id}')">✕</button>`;
    list.appendChild(row);
  });
}

function loadSnapshot(id) {
  if (!confirm('Wczytać snapshot? Nadpisze aktywne pingi i generałów.')) return;
  socket.emit('grotaLoadSnapshot', id);
}
function deleteSnapshot(id) { socket.emit('grotaDeleteSnapshot', id); }

/* =====================
   HEATMAPA
===================== */

/* Cluster history points with radius 4% of map */
const CLUSTER_R = 0.04;

function clusterPoints(pts) {
  const clusters = [];
  for (const pt of pts) {
    let found = false;
    for (const cl of clusters) {
      const dx = cl.x - pt.x, dy = cl.y - pt.y;
      if (Math.sqrt(dx*dx + dy*dy) < CLUSTER_R) {
        cl.count++;
        // moving centroid
        cl.x = (cl.x * (cl.count-1) + pt.x) / cl.count;
        cl.y = (cl.y * (cl.count-1) + pt.y) / cl.count;
        found = true; break;
      }
    }
    if (!found) clusters.push({ x: pt.x, y: pt.y, count: 1 });
  }
  return clusters.sort((a,b) => b.count - a.count);
}

function drawHeatmap() {
  const w = heatCanvas.width;
  const h = heatCanvas.height;
  heatCtx.clearRect(0, 0, w, h);
  if (!heatOn || history.length === 0) return;

  const clusters = clusterPoints(history);
  if (clusters.length === 0) return;

  const maxCount = clusters[0].count;

  for (const cl of clusters) {
    const cx = cl.x * w;
    const cy = cl.y * h;
    const intensity = cl.count / maxCount;  // 0..1
    const radius = (0.04 + intensity * 0.04) * w;  // 4–8% of map width

    // Radial gradient: hot center → transparent edge
    const grad = heatCtx.createRadialGradient(cx, cy, 0, cx, cy, radius);

    // Color: dim orange at low intensity, bright yellow-orange at high
    const alpha = 0.25 + intensity * 0.55;  // 0.25 → 0.8
    if (intensity > 0.7) {
      grad.addColorStop(0,   `rgba(255,220,40,${alpha})`);
      grad.addColorStop(0.4, `rgba(255,140,20,${alpha * 0.7})`);
      grad.addColorStop(1,   'rgba(255,80,0,0)');
    } else if (intensity > 0.35) {
      grad.addColorStop(0,   `rgba(255,140,30,${alpha})`);
      grad.addColorStop(0.5, `rgba(200,80,10,${alpha * 0.6})`);
      grad.addColorStop(1,   'rgba(180,40,0,0)');
    } else {
      grad.addColorStop(0,   `rgba(180,80,20,${alpha})`);
      grad.addColorStop(0.5, `rgba(120,40,10,${alpha * 0.5})`);
      grad.addColorStop(1,   'rgba(80,20,0,0)');
    }

    heatCtx.beginPath();
    heatCtx.arc(cx, cy, radius, 0, Math.PI * 2);
    heatCtx.fillStyle = grad;
    heatCtx.fill();
  }

  // Update sidebar hotspot list
  updateHotspots(clusters.slice(0, 5), maxCount);
}

function updateHotspots(top, maxCount) {
  const sec  = document.getElementById('hotspotSection');
  const list = document.getElementById('hotspotList');
  if (!heatOn || top.length === 0) { sec.style.display = 'none'; return; }
  sec.style.display = 'block';
  list.innerHTML = top.map((cl, i) => {
    const intensity = cl.count / maxCount;
    const color = intensity > 0.7 ? '#ffda28' : intensity > 0.35 ? '#ff8c1e' : '#b45014';
    return `<div class="hotspot-item">
      <div class="hotspot-dot" style="background:${color};box-shadow:0 0 6px ${color}66"></div>
      <span style="color:${color}">Miejsce ${i+1}</span>
      <span class="hotspot-count">&nbsp;— ${cl.count}× pingowano</span>
    </div>`;
  }).join('');
}

function syncCanvas() {
  const rect = mapImg.getBoundingClientRect();
  heatCanvas.width  = rect.width;
  heatCanvas.height = rect.height;
  drawHeatmap();
}

function toggleHeat() {
  heatOn = !heatOn;
  localStorage.setItem('heat', heatOn ? '1' : '0');
  updateHeatBtn();
  syncCanvas();
  if (heatOn) heatCanvas.classList.add('visible');
  else { heatCanvas.classList.remove('visible'); document.getElementById('hotspotSection').style.display='none'; }
}

function updateHeatBtn() {
  if (heatOn) {
    heatBtn.textContent = '🔥 Heatmapa ON';
    heatBtn.classList.add('on');
    heatCanvas.classList.add('visible');
  } else {
    heatBtn.textContent = '🔥 Heatmapa OFF';
    heatBtn.classList.remove('on');
    heatCanvas.classList.remove('visible');
  }
}

/* Resize observer — keep canvas in sync with image size */
const resizeObs = new ResizeObserver(() => { if (heatOn) syncCanvas(); });
resizeObs.observe(mapImg);
mapImg.addEventListener('load', () => { if (heatOn) syncCanvas(); });

/* SOCKET */
socket.on('grotaGeneralsUpdate', data => {
  generals = data;
  renderGenerals();
});

socket.on('grotaSnapshotsUpdate', data => {
  snapshots = data;
  renderSnapshots();
});

// Inicjalizacja lewego panelu
initRouteCanvas();
renderChCounters();
renderDeadList();

socket.on('grotaPingsUpdate', data => {
  pings = data;
  renderPings();
});

socket.on('grotaHistoryUpdate', data => {
  history = data;
  if (heatOn) syncCanvas();
  if (routeOn) drawRoute();
});

socket.on('deadHistoryUpdate', data => {

  renderDeadList();
});

/* ═══ SUGEROWANA TRASA ═══ */
let routeOn = false;
let routeCanvas, routeCtx;
function initRouteCanvas() {
  routeCanvas = document.getElementById('routeCanvas');
  if (routeCanvas) routeCtx = routeCanvas.getContext('2d');
}

// Waypoints trasy — % szerokości/wysokości mapy, wzdłuż korytarzy
// Zoptymalizowane pod układ mapy groty
const ROUTE_WAYPOINTS = [
  [0.08,0.08],[0.22,0.08],[0.38,0.08],[0.55,0.08],[0.72,0.08],[0.88,0.08],
  [0.88,0.22],[0.72,0.22],[0.55,0.22],[0.38,0.22],[0.22,0.22],[0.08,0.22],
  [0.08,0.38],[0.22,0.38],[0.38,0.38],[0.55,0.38],[0.72,0.38],[0.88,0.38],
  [0.88,0.55],[0.72,0.55],[0.55,0.55],[0.38,0.55],[0.22,0.55],[0.08,0.55],
  [0.08,0.72],[0.22,0.72],[0.38,0.72],[0.55,0.72],[0.72,0.72],[0.88,0.72],
  [0.88,0.88],[0.72,0.88],[0.55,0.88],[0.38,0.88],[0.22,0.88],
];

function toggleRoute() {
  if (!routeCanvas) initRouteCanvas();
  routeOn = !routeOn;
  const btn = document.getElementById('routeBtn');
  if (routeOn) {
    btn.style.background = 'rgba(60,140,255,0.2)';
    btn.style.borderColor = 'rgba(60,140,255,0.7)';
    btn.innerText = '🗺 Trasa ON';
    drawRoute();
  } else {
    btn.style.background = 'rgba(60,140,255,0.1)';
    btn.style.borderColor = 'rgba(60,140,255,0.3)';
    btn.innerText = '🗺 Trasa OFF';
    if (routeCtx) routeCtx.clearRect(0,0,routeCanvas.width,routeCanvas.height);
  }
}

function drawRoute() {
  const imgW = mapImg.offsetWidth;
  const imgH = mapImg.offsetHeight;
  routeCanvas.width  = imgW;
  routeCanvas.height = imgH;
  routeCtx.clearRect(0,0,imgW,imgH);
  if (!routeOn) return;

  // Jeśli jest heatmapa — posortuj waypoints wg temperatury (najgorętsze na początku)
  let pts = ROUTE_WAYPOINTS.map(([px,py]) => ({
    x: px*imgW, y: py*imgH,
    heat: getHeatAt(px,py)
  }));

  // Znajdź punkt startowy (najgorętszy) i zrób optymalną trasę nearest-neighbor
  let start = pts.reduce((best,p) => p.heat > best.heat ? p : best, pts[0]);
  let ordered = [start];
  let remaining = pts.filter(p => p !== start);
  while (remaining.length) {
    const last = ordered[ordered.length-1];
    let nearest = remaining.reduce((best,p) => {
      const d = Math.hypot(p.x-last.x,p.y-last.y);
      return d < Math.hypot(best.x-last.x,best.y-last.y) ? p : best;
    });
    ordered.push(nearest);
    remaining = remaining.filter(p => p !== nearest);
  }

  // Rysuj trasę
  routeCtx.beginPath();
  routeCtx.strokeStyle = 'rgba(60,200,255,0.7)';
  routeCtx.lineWidth   = 2.5;
  routeCtx.setLineDash([8,5]);
  routeCtx.lineCap     = 'round';
  routeCtx.lineJoin    = 'round';
  ordered.forEach((p,i) => {
    if (i===0) routeCtx.moveTo(p.x,p.y);
    else routeCtx.lineTo(p.x,p.y);
  });
  routeCtx.stroke();

  // Numery kroków
  ordered.forEach((p,i) => {
    const heat = p.heat;
    const col  = heat > 0.5 ? '#ff6040' : heat > 0.2 ? '#e0c040' : '#60b0ff';
    routeCtx.beginPath();
    routeCtx.arc(p.x,p.y,8,0,Math.PI*2);
    routeCtx.fillStyle = 'rgba(0,0,0,0.7)';
    routeCtx.fill();
    routeCtx.strokeStyle = col;
    routeCtx.lineWidth = 1.5;
    routeCtx.setLineDash([]);
    routeCtx.stroke();
    routeCtx.fillStyle = col;
    routeCtx.font = 'bold 8px Cinzel,serif';
    routeCtx.textAlign = 'center';
    routeCtx.textBaseline = 'middle';
    routeCtx.fillText(i+1, p.x, p.y);
    routeCtx.setLineDash([8,5]);
  });
}

function getHeatAt(px,py) {
  if (!history || !history.length) return 0;
  const imgW = mapImg.offsetWidth;
  const imgH = mapImg.offsetHeight;
  const r    = 0.08; // promień wpływu
  let sum    = 0;
  history.forEach(h => {
    const dx = h.x - px, dy = h.y - py;
    const d  = Math.sqrt(dx*dx + dy*dy);
    if (d < r) sum += (1 - d/r);
  });
  return Math.min(1, sum / 5);
}

// Przerysuj trasę przy zmianie rozmiaru
window.addEventListener('resize', () => { if (routeOn) drawRoute(); });
mapImg.addEventListener('load', () => { if (routeOn) drawRoute(); });

</script>
