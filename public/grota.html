<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grota Wygnańców</title>
<script src="/socket.io/socket.io.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #c9a84c; --gold-light: #f0d080; --gold-dark: #7a5f1e;
    --bg: #090806; --border: #3a2e1a; --text: #d4c4a0; --text-dim: #7a6a50;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Crimson Text',serif; background:var(--bg); color:var(--text); min-height:100vh; overflow-x:hidden; }
  .bg-layer { position:fixed; inset:0; z-index:0; background:radial-gradient(ellipse 80% 40% at 50% 0%, rgba(40,20,80,0.15) 0%, transparent 60%), #090806; }

  /* TOP BAR */
  .topbar {
    position:relative; z-index:10;
    display:flex; align-items:center; justify-content:space-between;
    max-width:1500px; margin:0 auto; padding:14px 20px;
    border-bottom:1px solid var(--border);
    background:linear-gradient(to bottom,rgba(17,14,9,0.96),rgba(9,8,6,0.8));
  }
  .topbar-left { display:flex; align-items:center; gap:12px; }
  .page-title { font-family:'Cinzel',serif; font-size:18px; font-weight:600; color:var(--gold-light); letter-spacing:2px; text-shadow:0 0 20px rgba(201,168,76,0.4); }
  .nav-btn {
    font-family:'Cinzel',serif; font-size:10px; letter-spacing:2px; text-transform:uppercase;
    color:var(--gold-dark); background:rgba(201,168,76,0.06);
    border:1px solid rgba(201,168,76,0.25); border-radius:2px;
    padding:7px 14px; cursor:pointer; text-decoration:none; display:inline-block; transition:all 0.2s;
  }
  .nav-btn:hover { color:var(--gold); border-color:rgba(201,168,76,0.6); background:rgba(201,168,76,0.12); }

  /* LAYOUT */
  .layout {
    position:relative; z-index:1;
    display:flex; gap:0;
    max-width:1500px; margin:0 auto;
    min-height:calc(100vh - 60px);
  }

  /* MAP AREA */
  .map-wrap {
    flex:1; position:relative;
    padding:20px; min-width:0;
    display:flex; align-items:flex-start; justify-content:center;
  }
  .map-container {
    position:relative; display:inline-block;
    cursor:crosshair;
    border:1px solid rgba(201,168,76,0.2);
    border-radius:3px;
    box-shadow:0 0 40px rgba(0,0,0,0.8);
  }
  .map-container img {
    display:block;
    max-width:100%;
    max-height:calc(100vh - 120px);
    width:auto; height:auto;
    user-select:none; pointer-events:none;
  }

  /* INSTRUKCJA */
  .map-hint {
    position:absolute; bottom:28px; left:50%; transform:translateX(-50%);
    font-family:'Cinzel',serif; font-size:9px; letter-spacing:3px; text-transform:uppercase;
    color:rgba(201,168,76,0.4); white-space:nowrap; pointer-events:none;
  }

  /* PING MARKER */
  .ping-marker {
    position:absolute; transform:translate(-50%,-50%);
    pointer-events:all; z-index:5;
    display:flex; flex-direction:column; align-items:center; gap:2px;
  }
  .ping-dot {
    width:28px; height:28px; border-radius:50%;
    background:radial-gradient(circle at 35% 35%, #ff6060, #cc1111);
    border:2px solid #ff8080;
    box-shadow:0 0 10px rgba(255,60,60,0.7), 0 0 25px rgba(255,60,60,0.3);
    display:flex; align-items:center; justify-content:center;
    font-family:'Cinzel',serif; font-size:10px; font-weight:600; color:#fff;
    cursor:pointer; transition:transform 0.15s, box-shadow 0.15s;
    animation:ping-appear 0.3s cubic-bezier(0.23,1,0.32,1);
  }
  .ping-dot:hover {
    transform:scale(1.2);
    box-shadow:0 0 15px rgba(255,60,60,0.9), 0 0 35px rgba(255,60,60,0.5);
  }
  @keyframes ping-appear {
    0% { transform:scale(0); opacity:0; }
    70% { transform:scale(1.2); }
    100% { transform:scale(1); opacity:1; }
  }
  .ping-pulse {
    position:absolute; top:50%; left:50%;
    width:28px; height:28px;
    border-radius:50%;
    background:rgba(255,60,60,0.3);
    transform:translate(-50%,-50%);
    animation:pulse-ring 2s ease-out infinite;
    pointer-events:none;
  }
  @keyframes pulse-ring {
    0%   { transform:translate(-50%,-50%) scale(1); opacity:0.6; }
    100% { transform:translate(-50%,-50%) scale(2.8); opacity:0; }
  }
  .ping-label {
    background:rgba(0,0,0,0.85); border:1px solid rgba(201,168,76,0.3);
    border-radius:2px; padding:2px 7px;
    font-family:'Cinzel',serif; font-size:9px; letter-spacing:1px; color:var(--gold);
    white-space:nowrap; pointer-events:none;
  }
  .ping-timer {
    background:rgba(0,0,0,0.85); border:1px solid rgba(255,60,60,0.3);
    border-radius:2px; padding:2px 7px;
    font-family:'Cinzel',serif; font-size:10px; letter-spacing:1px; color:#ff9090;
    white-space:nowrap; pointer-events:none;
  }

  /* SIDEBAR */
  .sidebar {
    width:280px; flex-shrink:0;
    border-left:1px solid var(--border);
    background:rgba(12,10,7,0.7);
    display:flex; flex-direction:column;
    max-height:calc(100vh - 60px);
    overflow-y:auto;
  }
  .sidebar-header {
    padding:14px 16px; border-bottom:1px solid var(--border);
    background:rgba(0,0,0,0.3);
    font-family:'Cinzel',serif; font-size:11px; letter-spacing:3px;
    color:var(--gold); text-transform:uppercase; position:sticky; top:0; z-index:2;
  }
  .sidebar-empty {
    padding:30px 16px; text-align:center;
    font-size:13px; color:var(--text-dim); font-style:italic;
  }

  /* PING LIST ITEM */
  .ping-item {
    display:flex; align-items:center; gap:10px;
    padding:10px 14px; border-bottom:1px solid rgba(58,46,26,0.4);
    transition:background 0.2s;
  }
  .ping-item:hover { background:rgba(201,168,76,0.04); }
  .ping-dot-small {
    width:22px; height:22px; flex-shrink:0; border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#ff6060,#cc1111);
    border:1.5px solid #ff8080;
    display:flex; align-items:center; justify-content:center;
    font-family:'Cinzel',serif; font-size:9px; font-weight:600; color:#fff;
  }
  .ping-info { flex:1; min-width:0; }
  .ping-ch { font-family:'Cinzel',serif; font-size:11px; color:var(--gold-light); letter-spacing:1px; }
  .ping-time { font-family:'Cinzel',serif; font-size:13px; color:#ff9090; margin-top:2px; letter-spacing:1px; }
  .ping-remove {
    font-size:10px; color:#804040; background:none; border:none; cursor:pointer;
    font-family:'Cinzel',serif; letter-spacing:1px; padding:4px 8px;
    border:1px solid rgba(180,50,50,0.2); border-radius:2px; transition:all 0.2s;
  }
  .ping-remove:hover { color:#ff6060; border-color:rgba(200,60,60,0.6); background:rgba(140,30,30,0.15); }

  /* POPUP (channel selector) */
  .popup-overlay {
    position:fixed; inset:0; z-index:100;
    display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.5);
  }
  .popup-overlay.hidden { display:none; }
  .popup-box {
    background:linear-gradient(160deg,#1e1810,#100d08);
    border:1px solid var(--gold-dark); border-radius:4px;
    padding:28px 32px; min-width:280px; text-align:center;
    box-shadow:0 0 60px rgba(0,0,0,0.9), 0 0 30px rgba(201,168,76,0.07);
    position:relative;
  }
  .popup-box::before,.popup-box::after { content:''; position:absolute; width:14px; height:14px; border-color:rgba(201,168,76,0.5); border-style:solid; }
  .popup-box::before { top:7px; left:7px; border-width:1px 0 0 1px; }
  .popup-box::after  { bottom:7px; right:7px; border-width:0 1px 1px 0; }
  .popup-title { font-family:'Cinzel',serif; font-size:12px; letter-spacing:3px; color:var(--gold); text-transform:uppercase; margin-bottom:6px; }
  .popup-sub { font-size:13px; color:var(--text-dim); font-style:italic; margin-bottom:20px; }
  .ch-buttons { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-bottom:16px; }
  .ch-btn {
    font-family:'Cinzel',serif; font-size:11px; letter-spacing:1px;
    width:44px; height:44px; border-radius:3px; cursor:pointer; transition:all 0.2s;
    border:1px solid rgba(201,168,76,0.3); color:var(--gold-dark); background:rgba(201,168,76,0.07);
  }
  .ch-btn:hover { color:var(--gold-light); border-color:var(--gold); background:rgba(201,168,76,0.2); transform:scale(1.08); box-shadow:0 0 12px rgba(201,168,76,0.2); }
  .popup-cancel {
    font-family:'Cinzel',serif; font-size:9px; letter-spacing:2px; text-transform:uppercase;
    color:var(--text-dim); background:none; border:1px solid rgba(255,255,255,0.08);
    border-radius:2px; padding:7px 20px; cursor:pointer; transition:all 0.2s; width:100%;
  }
  .popup-cancel:hover { color:var(--text); border-color:rgba(255,255,255,0.2); }
</style>
</head>
<body>
<div class="bg-layer"></div>

<!-- POPUP WYBORU KANAŁU -->
<div class="popup-overlay hidden" id="popup">
  <div class="popup-box">
    <div class="popup-title">Pinguj Metina</div>
    <div class="popup-sub">Wybierz kanał</div>
    <div class="ch-buttons" id="chButtons"></div>
    <button class="popup-cancel" onclick="closePopup()">Anuluj</button>
  </div>
</div>

<div class="topbar">
  <div class="topbar-left">
    <a class="nav-btn" href="/">⬅ Powrót</a>
    <div class="page-title">Grota Wygnańców</div>
  </div>
</div>

<div class="layout">

  <!-- MAPA -->
  <div class="map-wrap">
    <div class="map-container" id="mapContainer">
      <img src="/grota_mapa.png" id="mapImg" alt="Mapa Groty Wygnańców" draggable="false">
      <div id="pingLayer"></div>
      <div class="map-hint">Kliknij na mapę aby pingować metina</div>
    </div>
  </div>

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">Aktywne pingi</div>
    <div id="pingList"><div class="sidebar-empty">Brak aktywnych pingów</div></div>
  </div>

</div>

<script>
const socket = io();

/* STATE */
let pings = {};          // {id: {id,x,y,ch,startedAt}}
let pendingClick = null; // {x,y} — gdzie kliknął user, czeka na wybór kanału
let timerRafs = {};      // animationFrame per ping for timers

/* MAP */
const mapContainer = document.getElementById('mapContainer');
const mapImg       = document.getElementById('mapImg');
const pingLayer    = document.getElementById('pingLayer');

/* Click on map */
mapContainer.addEventListener('click', e => {
  if (e.target.closest('.ping-dot')) return; // ignore clicks on existing markers
  const rect = mapImg.getBoundingClientRect();
  const containerRect = mapContainer.getBoundingClientRect();
  // coords relative to image, as fraction (0-1)
  const x = (e.clientX - rect.left) / rect.width;
  const y = (e.clientY - rect.top)  / rect.height;
  if (x < 0 || x > 1 || y < 0 || y > 1) return;
  pendingClick = { x, y };
  openPopup();
});

/* POPUP */
const popup = document.getElementById('popup');
const chButtons = document.getElementById('chButtons');
const MAX_CH = 12;

function openPopup() {
  chButtons.innerHTML = '';
  for (let i = 1; i <= MAX_CH; i++) {
    const btn = document.createElement('button');
    btn.className = 'ch-btn';
    btn.innerText = i;
    btn.onclick = () => confirmPing(i);
    chButtons.appendChild(btn);
  }
  popup.classList.remove('hidden');
}
function closePopup() {
  popup.classList.add('hidden');
  pendingClick = null;
}
popup.addEventListener('click', e => { if (e.target === popup) closePopup(); });

function confirmPing(ch) {
  if (!pendingClick) return;
  socket.emit('grotaAddPing', { x: pendingClick.x, y: pendingClick.y, ch });
  closePopup();
}

/* FORMAT timer */
function fmt(ms) {
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (h > 0) return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
  return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
}

/* RENDER ALL PINGS */
function renderPings() {
  // stop all ticking
  for (const id in timerRafs) cancelAnimationFrame(timerRafs[id]);
  timerRafs = {};

  pingLayer.innerHTML = '';
  const list = document.getElementById('pingList');

  const ids = Object.keys(pings);
  if (ids.length === 0) {
    list.innerHTML = '<div class="sidebar-empty">Brak aktywnych pingów</div>';
    return;
  }

  list.innerHTML = '';

  for (const id of ids) {
    const p = pings[id];
    placeMarker(p);
    addSidebarItem(p);
    startTicking(p);
  }
}

/* PLACE MARKER ON MAP */
function placeMarker(p) {
  const marker = document.createElement('div');
  marker.className = 'ping-marker';
  marker.id = 'marker_' + p.id;
  marker.style.left = (p.x * 100) + '%';
  marker.style.top  = (p.y * 100) + '%';

  marker.innerHTML = `
    <div class="ping-dot" onclick="removePing('${p.id}')" title="Kliknij aby usunąć">
      <div class="ping-pulse"></div>
      ${p.ch}
    </div>
    <div class="ping-label">CH ${p.ch}</div>
    <div class="ping-timer" id="mt_${p.id}">00:00</div>
  `;
  pingLayer.appendChild(marker);
}

/* SIDEBAR ITEM */
function addSidebarItem(p) {
  const item = document.createElement('div');
  item.className = 'ping-item';
  item.id = 'sitem_' + p.id;
  item.innerHTML = `
    <div class="ping-dot-small">${p.ch}</div>
    <div class="ping-info">
      <div class="ping-ch">Kanał ${p.ch}</div>
      <div class="ping-time" id="st_${p.id}">00:00</div>
    </div>
    <button class="ping-remove" onclick="removePing('${p.id}')">✕ Zbity</button>
  `;
  document.getElementById('pingList').appendChild(item);
}

/* TICK TIMER FOR ONE PING */
function startTicking(p) {
  function tick() {
    const elapsed = Date.now() - p.startedAt;
    const str = fmt(elapsed);
    const mt = document.getElementById('mt_' + p.id);
    const st = document.getElementById('st_' + p.id);
    if (mt) mt.innerText = str;
    if (st) st.innerText = str;
    timerRafs[p.id] = requestAnimationFrame(tick);
  }
  timerRafs[p.id] = requestAnimationFrame(tick);
}

/* REMOVE PING */
function removePing(id) {
  socket.emit('grotaRemovePing', id);
}

/* SOCKET */
socket.on('grotaPingsUpdate', data => {
  pings = data;
  renderPings();
});

/* RESIZE — reposition markers stays % based so auto */
</script>
</body>
</html>
