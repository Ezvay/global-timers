<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kraina Gigantów</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

/* TOP BAR */

.topbar{
display:flex;
justify-content:space-between;
max-width:1200px;
margin:20px auto;
padding:0 20px;
}

.layoutButtons{
display:flex;
gap:10px;
justify-content:center;
margin-bottom:20px;
flex-wrap:wrap;
}

.layoutButtons button{
background:linear-gradient(#1f3d6b,#0f1f3b);
border:2px solid #4a8acb;
color:#bcdcff;
padding:6px 14px;
border-radius:6px;
cursor:pointer;
}

.backButton{
background:linear-gradient(#6b4d1f,#3b2a0f);
border:2px solid #caa64a;
color:#ffd36a;
padding:8px 18px;
border-radius:8px;
cursor:pointer;
}

.soundButton{
background:linear-gradient(#1e3d1e,#0f1f0f);
border:2px solid #5fa85f;
color:#9aff9a;
padding:8px 18px;
border-radius:8px;
cursor:pointer;
}

/* GRID */

.container{
display:grid;
gap:12px;
max-width:1200px;
margin:auto;
padding:10px;
}

.layout-1x8-vertical{
grid-template-columns:1fr;
}

.layout-1x8-horizontal{
grid-template-columns:repeat(8,1fr);
}

.layout-2x4-horizontal{
grid-template-columns:repeat(4,1fr);
}

.layout-2x4-vertical{
grid-template-columns:repeat(2,1fr);
}

/* TIMER */

.timer{
background:linear-gradient(#1a1a1a,#0c0c0c);
padding:10px;
border-radius:8px;
border:2px solid #6a5125;
}

.time{
font-size:16px;
margin:6px 0;
font-weight:bold;
}

.comment{
width:90%;
margin-top:6px;
background:#222;
border:1px solid #555;
color:white;
font-size:11px;
padding:4px;
}

.grey{
border-color:#555;
background:#2a2a2a;
}

.red{
border-color:#7a1f1f;
background:linear-gradient(#2b0d0d,#1a0606);
}

.yellow{
border-color:#b8972e;
background:linear-gradient(#3a320e,#1c1707);
}

.green{
border-color:#3fa34d;
background:linear-gradient(#0d2a13,#07180b);
}

button{
background:linear-gradient(#6b4d1f,#3b2a0f);
border:1px solid #caa64a;
color:#ffd36a;
font-size:11px;
padding:4px 8px;
margin:2px;
border-radius:6px;
cursor:pointer;
}

.sectionTitle{
font-size:20px;
margin-top:30px;
}

</style>
</head>

<body>

<div class="topbar">

<button class="backButton" onclick="window.location.href='/'">
⬅ Powrót
</button>

<button id="soundToggle" class="soundButton">
🔊 Dźwięk ON
</button>

<div>
Aktywna sekcja:
<select id="activeSection">
<option value="top">GÓRA</option>
<option value="bottom">DÓŁ</option>
</select>
</div>

</div>

<h1>Kraina Gigantów</h1>

<div class="layoutButtons">

<button onclick="setLayout('layout-1x8-vertical')">1×8 pionowo</button>
<button onclick="setLayout('layout-1x8-horizontal')">1×8 poziomo</button>
<button onclick="setLayout('layout-2x4-vertical')">2×4 pionowo</button>
<button onclick="setLayout('layout-2x4-horizontal')">2×4 poziomo</button>

</div>

<div class="sectionTitle">GÓRA</div>
<div class="container layout-2x4-horizontal" id="timersTop"></div>

<div class="sectionTitle">DÓŁ</div>
<div class="container layout-2x4-horizontal" id="timersBottom"></div>

<script>

const socket = io()

const audioCtx = new (window.AudioContext || window.webkitAudioContext)()

function beep(duration=0.15,freq=800){

if(!soundEnabled) return

const osc=audioCtx.createOscillator()
const gain=audioCtx.createGain()

osc.connect(gain)
gain.connect(audioCtx.destination)

osc.frequency.value=freq
osc.start()

gain.gain.setValueAtTime(0.2,audioCtx.currentTime)
gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+duration)

osc.stop(audioCtx.currentTime+duration)

}

function tripleBeep(){
beep()
setTimeout(()=>beep(),250)
setTimeout(()=>beep(),500)
}

function singleBeep(){
beep(0.7,600)
}

/* SOUND */

let soundEnabled = localStorage.getItem("sound") !== "off"

const soundButton=document.getElementById("soundToggle")

function updateSound(){
soundButton.innerText=soundEnabled?"🔊 Dźwięk ON":"🔇 Dźwięk OFF"
}

updateSound()

soundButton.onclick=()=>{
soundEnabled=!soundEnabled
localStorage.setItem("sound",soundEnabled?"on":"off")
updateSound()
}

/* LAYOUT */

function setLayout(layout){

document.getElementById("timersTop").className="container "+layout
document.getElementById("timersBottom").className="container "+layout

localStorage.setItem("layout",layout)

}

const savedLayout=localStorage.getItem("layout")

if(savedLayout){
setLayout(savedLayout)
}

/* FORMAT */

function format(sec){

let h=String(Math.floor(sec/3600)).padStart(2,"0")
let m=String(Math.floor((sec%3600)/60)).padStart(2,"0")
let s=String(sec%60).padStart(2,"0")

return h+":"+m+":"+s

}

/* TIMER */

function createTimer(id,section){

let box=document.createElement("div")
box.className="timer grey"

let title=document.createElement("div")
title.innerText=id.replace("KG_","").replace("KGD_","")

let time=document.createElement("div")
time.className="time"

let start=document.createElement("button")
start.innerText="Start"

let stop=document.createElement("button")
stop.innerText="Stop"

let reset=document.createElement("button")
reset.innerText="Reset"

let comment=document.createElement("input")
comment.className="comment"
comment.placeholder="Komentarz..."

start.onclick=()=>socket.emit("start",id)
stop.onclick=()=>socket.emit("stop",id)

reset.onclick=()=>{

let active=document.getElementById("activeSection").value

if(active!==section){
alert("Ta sekcja jest zablokowana")
return
}

comment.value=""
socket.emit("reset",id)

}

box.appendChild(title)
box.appendChild(time)
box.appendChild(start)
box.appendChild(stop)
box.appendChild(reset)
box.appendChild(comment)

return {box,time,beepYellow:false,beepGreen:false}

}

let displays={}

/* GÓRA */

const topContainer=document.getElementById("timersTop")

for(let i=1;i<=8;i++){

let id="KG_CH"+i

let timer=createTimer(id,"top")

topContainer.appendChild(timer.box)

displays[id]=timer

}

/* DÓŁ */

const bottomContainer=document.getElementById("timersBottom")

for(let i=1;i<=8;i++){

let id="KGD_CH"+i

let timer=createTimer(id,"bottom")

bottomContainer.appendChild(timer.box)

displays[id]=timer

}

socket.on("update",(data)=>{

for(let id in data){

if(displays[id]){

let sec=data[id]
let timer=displays[id]

timer.time.innerText=format(sec)

let box=timer.box

box.classList.remove("grey","red","yellow","green")

if(sec===0){
box.classList.add("grey")
}
else if(sec<1500){
box.classList.add("red")
}
else if(sec<1800){
box.classList.add("yellow")
}
else{
box.classList.add("green")
}

if(sec>=1500 && sec<1502){

if(!timer.beepYellow){
tripleBeep()
timer.beepYellow=true
}

}

if(sec>=1800 && sec<1802){

if(!timer.beepGreen){
singleBeep()
timer.beepGreen=true
}

}

}

}

})

</script>

</body>
</html>
