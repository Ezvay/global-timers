<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kraina Gigantów</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

/* TOP BAR */

.topbar{
display:flex;
justify-content:space-between;
max-width:1200px;
margin:20px auto;
padding:0 20px;
}

/* SEKCJE */

.section{
max-width:1200px;
margin:20px auto;
padding:15px;
border-radius:12px;
border:2px solid transparent;
transition:0.3s;
}

.section.active{
border-color:#a855f7;
background:rgba(168,85,247,0.08);
box-shadow:0 0 20px rgba(168,85,247,0.3);
}

.sectionTitle{
font-size:20px;
margin-bottom:10px;
cursor:pointer;
}

/* PANEL DŹWIĘKU */

.soundPanel{
max-width:600px;
margin:10px auto;
background:#1a1a1a;
border:2px solid #444;
border-radius:8px;
padding:10px;
}

/* GRID */

.container{
display:grid;
gap:12px;
padding:10px;
}

.layout-1x8-vertical{grid-template-columns:1fr;}
.layout-1x8-horizontal{grid-template-columns:repeat(8,1fr);}
.layout-2x4-horizontal{grid-template-columns:repeat(4,1fr);}
.layout-2x4-vertical{grid-template-columns:repeat(2,1fr);}

/* TIMER */

.timer{
background:linear-gradient(#1a1a1a,#0c0c0c);
padding:10px;
border-radius:8px;
border:2px solid #6a5125;
}

.time{
font-size:16px;
margin:6px 0;
font-weight:bold;
}

.comment{
width:90%;
margin-top:6px;
background:#222;
border:1px solid #555;
color:white;
font-size:11px;
padding:4px;
}

.grey{border-color:#555;background:#2a2a2a;}
.red{border-color:#7a1f1f;background:#2b0d0d;}
.yellow{border-color:#b8972e;background:#3a320e;}
.green{border-color:#3fa34d;background:#0d2a13;}

button{
background:linear-gradient(#6b4d1f,#3b2a0f);
border:1px solid #caa64a;
color:#ffd36a;
font-size:11px;
padding:4px 8px;
margin:2px;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="topbar">

<button onclick="window.location.href='/'">
⬅ Powrót
</button>

</div>

<h1>Kraina Gigantów</h1>

<div style="margin-bottom:15px">

<button onclick="setLayout('layout-1x8-vertical')">1×8 pionowo</button>
<button onclick="setLayout('layout-1x8-horizontal')">1×8 poziomo</button>
<button onclick="setLayout('layout-2x4-vertical')">2×4 pionowo</button>
<button onclick="setLayout('layout-2x4-horizontal')">2×4 poziomo</button>

</div>

<div style="margin-bottom:15px">

<button onclick="openTopOnly()">Pokaż tylko GÓRĘ</button>
<button onclick="openBottomOnly()">Pokaż tylko DÓŁ</button>

</div>

<div class="soundPanel" id="soundPanel">

<b>Panel dźwięków</b><br><br>

<label>
<input type="checkbox" id="soundTop"> Dźwięk GÓRA
</label>

<label>
<input type="checkbox" id="soundBottom"> Dźwięk DÓŁ
</label>

</div>

<div id="sectionTop" class="section active">
<div class="sectionTitle">GÓRA</div>
<div class="container layout-2x4-horizontal" id="timersTop"></div>
</div>

<div id="sectionBottom" class="section">
<div class="sectionTitle">DÓŁ</div>
<div class="container layout-2x4-horizontal" id="timersBottom"></div>
</div>

<script>

const socket = io()

/* URL PARAM */

const params = new URLSearchParams(window.location.search)
const viewMode = params.get("view")

/* AUTOMATYCZNE DŹWIĘKI */

let soundTop = true
let soundBottom = true

if(viewMode === "top"){
soundBottom = false
}

if(viewMode === "bottom"){
soundTop = false
}

/* UKRYCIE PANELU DŹWIĘKU */

if(viewMode === "top" || viewMode === "bottom"){
document.getElementById("soundPanel").style.display = "none"
}

/* PRZYCISKI OKIEN */

function openTopOnly(){
window.open("/giants.html?view=top","_blank")
}

function openBottomOnly(){
window.open("/giants.html?view=bottom","_blank")
}

/* AKTYWNA SEKCJA */

let activeSection="top"

const sectionTop=document.getElementById("sectionTop")
const sectionBottom=document.getElementById("sectionBottom")

sectionTop.onclick=()=>{
activeSection="top"
sectionTop.classList.add("active")
sectionBottom.classList.remove("active")
}

sectionBottom.onclick=()=>{
activeSection="bottom"
sectionBottom.classList.add("active")
sectionTop.classList.remove("active")
}

/* PANEL DŹWIĘKÓW */

const soundTopCheckbox = document.getElementById("soundTop")
const soundBottomCheckbox = document.getElementById("soundBottom")

if(soundTopCheckbox){
soundTopCheckbox.checked = soundTop
soundBottomCheckbox.checked = soundBottom

soundTopCheckbox.onchange=()=>{
soundTop=soundTopCheckbox.checked
}

soundBottomCheckbox.onchange=()=>{
soundBottom=soundBottomCheckbox.checked
}
}

/* AUDIO */

const audioCtx = new (window.AudioContext || window.webkitAudioContext)()

function beep(section,duration=0.15,freq=800){

if(section==="top" && !soundTop) return
if(section==="bottom" && !soundBottom) return

const osc=audioCtx.createOscillator()
const gain=audioCtx.createGain()

osc.connect(gain)
gain.connect(audioCtx.destination)

osc.frequency.value=freq
osc.start()

gain.gain.setValueAtTime(0.2,audioCtx.currentTime)
gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+duration)

osc.stop(audioCtx.currentTime+duration)

}

function tripleBeep(section){
beep(section)
setTimeout(()=>beep(section),250)
setTimeout(()=>beep(section),500)
}

function singleBeep(section){
beep(section,0.7,600)
}

/* LAYOUT */

function setLayout(layout){

document.getElementById("timersTop").className="container "+layout
document.getElementById("timersBottom").className="container "+layout

localStorage.setItem("layout",layout)

}

const savedLayout=localStorage.getItem("layout")

if(savedLayout){
setLayout(savedLayout)
}

/* FORMAT */

function format(sec){

let h=String(Math.floor(sec/3600)).padStart(2,"0")
let m=String(Math.floor((sec%3600)/60)).padStart(2,"0")
let s=String(sec%60).padStart(2,"0")

return h+":"+m+":"+s

}

/* TIMER */

function createTimer(id,section){

let box=document.createElement("div")
box.className="timer grey"

let title=document.createElement("div")
title.innerText=id.replace("KG_","").replace("KGD_","")

let time=document.createElement("div")
time.className="time"

let start=document.createElement("button")
start.innerText="Start"

let stop=document.createElement("button")
stop.innerText="Stop"

let reset=document.createElement("button")
reset.innerText="Reset"

let comment=document.createElement("input")
comment.className="comment"
comment.placeholder="Komentarz..."

start.onclick=()=>{
if(activeSection!==section) return
socket.emit("start",id)
}

stop.onclick=()=>{
if(activeSection!==section) return
socket.emit("stop",id)
}

reset.onclick=()=>{
if(activeSection!==section) return
comment.value=""
socket.emit("reset",id)
}

box.appendChild(title)
box.appendChild(time)
box.appendChild(start)
box.appendChild(stop)
box.appendChild(reset)
box.appendChild(comment)

return {box,time,section,beepYellow:false,beepGreen:false}

}

let displays={}

/* GÓRA */

for(let i=1;i<=8;i++){

let id="KG_CH"+i
let timer=createTimer(id,"top")

document.getElementById("timersTop").appendChild(timer.box)
displays[id]=timer

}

/* DÓŁ */

for(let i=1;i<=8;i++){

let id="KGD_CH"+i
let timer=createTimer(id,"bottom")

document.getElementById("timersBottom").appendChild(timer.box)
displays[id]=timer

}

/* UKRYWANIE SEKCJI */

if(viewMode==="top"){
sectionBottom.style.display="none"
}

if(viewMode==="bottom"){
sectionTop.style.display="none"
}

/* UPDATE */

socket.on("update",(data)=>{

for(let id in data){

if(displays[id]){

let sec=data[id]
let timer=displays[id]

timer.time.innerText=format(sec)

let box=timer.box

box.classList.remove("grey","red","yellow","green")

if(sec===0) box.classList.add("grey")
else if(sec<1500) box.classList.add("red")
else if(sec<1800) box.classList.add("yellow")
else box.classList.add("green")

if(sec>=1500 && sec<1502){

if(!timer.beepYellow){
tripleBeep(timer.section)
timer.beepYellow=true
}

}

if(sec>=1800 && sec<1802){

if(!timer.beepGreen){
singleBeep(timer.section)
timer.beepGreen=true
}

}

}

}

})

</script>

</body>
</html>
