<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kraina Gigantów</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

/* TOP */

.topbar{
display:flex;
justify-content:space-between;
max-width:1200px;
margin:20px auto;
padding:0 20px;
}

/* SEKCJE */

.section{
margin-bottom:40px;
}

.sectionTitle{
font-size:22px;
margin:20px 0;
}

/* GRID */

.container{
display:grid;
gap:12px;
max-width:1200px;
margin:auto;
padding:10px;
grid-template-columns:repeat(4,1fr);
}

/* TIMER */

.timer{
background:#1a1a1a;
padding:10px;
border-radius:8px;
border:2px solid #6a5125;
}

.time{
font-size:16px;
margin:6px 0;
font-weight:bold;
}

.grey{border-color:#555;background:#2a2a2a;}
.red{border-color:#7a1f1f;background:#2b0d0d;}
.yellow{border-color:#b8972e;background:#3a320e;}
.green{border-color:#3fa34d;background:#0d2a13;}

.comment{
width:90%;
margin-top:6px;
background:#222;
border:1px solid #555;
color:white;
font-size:11px;
padding:4px;
}

button{
background:linear-gradient(#6b4d1f,#3b2a0f);
border:1px solid #caa64a;
color:#ffd36a;
font-size:11px;
padding:4px 8px;
margin:2px;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="topbar">

<button onclick="window.location.href='/'">
⬅ Powrót
</button>

<div>

Aktywna sekcja:

<select id="sectionMode">
<option value="top">GÓRA</option>
<option value="bottom">DÓŁ</option>
</select>

</div>

</div>

<h1>Kraina Gigantów</h1>

<div class="section">

<div class="sectionTitle">GÓRA</div>

<div class="container" id="topTimers"></div>

</div>

<div class="section">

<div class="sectionTitle">DÓŁ</div>

<div class="container" id="bottomTimers"></div>

</div>

<script>

const socket = io()

function format(sec){

let h=String(Math.floor(sec/3600)).padStart(2,"0")
let m=String(Math.floor((sec%3600)/60)).padStart(2,"0")
let s=String(sec%60).padStart(2,"0")

return h+":"+m+":"+s

}

const sectionMode=document.getElementById("sectionMode")

let displays={}

function createTimer(id,label,section){

let box=document.createElement("div")
box.className="timer grey"

let title=document.createElement("div")
title.innerText=label

let time=document.createElement("div")
time.className="time"

let comment=document.createElement("input")
comment.className="comment"
comment.placeholder="Komentarz..."

let start=document.createElement("button")
start.innerText="Start"

let stop=document.createElement("button")
stop.innerText="Stop"

let reset=document.createElement("button")
reset.innerText="Reset"

start.onclick=()=>socket.emit("start",id)
stop.onclick=()=>socket.emit("stop",id)

reset.onclick=()=>{

if(sectionMode.value!==section){

alert("Nie możesz resetować tej sekcji")
return

}

comment.value=""
socket.emit("reset",id)

}

box.appendChild(title)
box.appendChild(time)
box.appendChild(start)
box.appendChild(stop)
box.appendChild(reset)
box.appendChild(comment)

return {box,time}

}

/* GÓRA */

const top=document.getElementById("topTimers")

for(let i=1;i<=8;i++){

let id="KG_CH"+i
let label="CH"+i

let timer=createTimer(id,label,"top")

top.appendChild(timer.box)

displays[id]=timer

}

/* DÓŁ */

const bottom=document.getElementById("bottomTimers")

for(let i=1;i<=8;i++){

let id="KGD_CH"+i
let label="CH"+i

let timer=createTimer(id,label,"bottom")

bottom.appendChild(timer.box)

displays[id]=timer

}

socket.on("update",(data)=>{

for(let id in data){

if(displays[id]){

let sec=data[id]

let timer=displays[id]

timer.time.innerText=format(sec)

let box=timer.box

box.classList.remove("grey","red","yellow","green")

if(sec===0) box.classList.add("grey")
else if(sec<1500) box.classList.add("red")
else if(sec<1800) box.classList.add("yellow")
else box.classList.add("green")

}

}

})

</script>

</body>
</html>
