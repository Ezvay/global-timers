<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Kraina Gigantów TEST</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{font-family:Arial;background:#111;color:white;text-align:center;}

.topbar{
display:flex;
justify-content:space-between;
max-width:900px;
margin:20px auto;
}

.container{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
max-width:900px;
margin:auto;
}

.timer{
background:#1a1a1a;
padding:10px;
border-radius:8px;
border:2px solid #555;
}

.time{
font-size:16px;
margin:6px 0;
font-weight:bold;
}

.red{background:#2b0d0d;border-color:#7a1f1f;}
.yellow{background:#3a320e;border-color:#b8972e;}
.green{background:#0d2a13;border-color:#3fa34d;}

button{
font-size:10px;
padding:4px 8px;
margin:2px;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Kraina Gigantów TEST</h1>

<div class="container" id="timers"></div>

<audio id="alertSound">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

const socket=io()
const alertSound=document.getElementById("alertSound")

function tripleBeep(){
for(let i=0;i<3;i++){
setTimeout(()=>{alertSound.currentTime=0;alertSound.play()},i*400)
}
}

function singleBeep(){
alertSound.currentTime=0
alertSound.play()
}

function format(sec){

let h=String(Math.floor(sec/3600)).padStart(2,"0")
let m=String(Math.floor((sec%3600)/60)).padStart(2,"0")
let s=String(sec%60).padStart(2,"0")

return h+":"+m+":"+s

}

function createTimer(id){

let box=document.createElement("div")
box.className="timer red"

let title=document.createElement("div")
title.innerText=id.replace("KG_","")

let time=document.createElement("div")
time.className="time"

let start=document.createElement("button")
start.innerText="Start"

let stop=document.createElement("button")
stop.innerText="Stop"

let reset=document.createElement("button")
reset.innerText="Reset"

start.onclick=()=>socket.emit("start",id)
stop.onclick=()=>socket.emit("stop",id)
reset.onclick=()=>socket.emit("reset",id)

box.appendChild(title)
box.appendChild(time)
box.appendChild(start)
box.appendChild(stop)
box.appendChild(reset)

return {box,time,yellow:false,green:false}

}

let container=document.getElementById("timers")
let displays={}

for(let i=1;i<=8;i++){

let id="KG_CH"+i
let timer=createTimer(id)

container.appendChild(timer.box)
displays[id]=timer

}

socket.on("update",(data)=>{

for(let id in data){

if(displays[id]){

let sec=data[id]
let timer=displays[id]

timer.time.innerText=format(sec)

let box=timer.box
box.classList.remove("red","yellow","green")

if(sec<30){
box.classList.add("red")
}

else if(sec<45){

box.classList.add("yellow")

if(!timer.yellow){
tripleBeep()
timer.yellow=true
}

}

else{

box.classList.add("green")

if(!timer.green){
singleBeep()
timer.green=true
}

}

}

}

})

</script>

</body>
</html>
