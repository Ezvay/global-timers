<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Loch Małp</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.topbar{
display:flex;
justify-content:space-between;
max-width:1200px;
margin:20px auto;
}

.backButton{
background:linear-gradient(#6b4d1f,#3b2a0f);
border:2px solid #caa64a;
color:#ffd36a;
padding:8px 18px;
border-radius:8px;
cursor:pointer;
}

.soundButton{
background:linear-gradient(#1e3d1e,#0f1f0f);
border:2px solid #5fa85f;
color:#9aff9a;
padding:8px 18px;
border-radius:8px;
cursor:pointer;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
max-width:1200px;
margin:auto;
}

.timer{
width:130px;
background:linear-gradient(#1a1a1a,#0c0c0c);
padding:10px;
border-radius:8px;
border:2px solid #6a5125;
}

.time{
font-size:16px;
margin:6px 0;
font-weight:bold;
}

/* kolory */

.grey{
border-color:#555;
background:#2a2a2a;
}

.red{
border-color:#7a1f1f;
background:linear-gradient(#2b0d0d,#1a0606);
}

.yellow{
border-color:#b8972e;
background:linear-gradient(#3a320e,#1c1707);
}

.green{
border-color:#3fa34d;
background:linear-gradient(#0d2a13,#07180b);
}

/* przyciski */

button{
background:linear-gradient(#6b4d1f,#3b2a0f);
border:1px solid #caa64a;
color:#ffd36a;
font-size:10px;
padding:4px 8px;
margin:2px;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="topbar">

<button class="backButton" onclick="window.location.href='/'">
⬅ Powrót
</button>

<button id="soundToggle" class="soundButton">
🔊 Dźwięk ON
</button>

</div>

<h1>Loch Małp</h1>

<div class="container" id="timers"></div>

<audio id="alertSound">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

const socket = io()

let soundEnabled = localStorage.getItem("sound") !== "off"

const soundButton=document.getElementById("soundToggle")
const alertSound=document.getElementById("alertSound")

function updateSound(){
soundButton.innerText=soundEnabled?"🔊 Dźwięk ON":"🔇 Dźwięk OFF"
}

updateSound()

soundButton.onclick=()=>{
soundEnabled=!soundEnabled
localStorage.setItem("sound",soundEnabled?"on":"off")
updateSound()
}

/* sygnały */

function tripleBeep(){

if(!soundEnabled) return

for(let i=0;i<3;i++){
setTimeout(()=>{
alertSound.currentTime=0
alertSound.play().catch(()=>{})
},i*400)
}

}

function singleBeep(){

if(!soundEnabled) return

alertSound.currentTime=0
alertSound.play().catch(()=>{})

}

/* format czasu */

function format(sec){

let h=String(Math.floor(sec/3600)).padStart(2,"0")
let m=String(Math.floor((sec%3600)/60)).padStart(2,"0")
let s=String(sec%60).padStart(2,"0")

return h+":"+m+":"+s

}

/* tworzenie timerów */

function createTimer(id){

let box=document.createElement("div")
box.className="timer grey"

let title=document.createElement("div")
title.innerText=id.replace("LM_","")

let time=document.createElement("div")
time.className="time"
time.innerText="00:00:00"

let start=document.createElement("button")
start.innerText="Start"

let stop=document.createElement("button")
stop.innerText="Stop"

let reset=document.createElement("button")
reset.innerText="Reset"

start.onclick=()=>socket.emit("start",id)
stop.onclick=()=>socket.emit("stop",id)
reset.onclick=()=>socket.emit("reset",id)

box.appendChild(title)
box.appendChild(time)
box.appendChild(start)
box.appendChild(stop)
box.appendChild(reset)

return {box,time,beep57:false,beep60:false}

}

let container=document.getElementById("timers")
let displays={}

for(let i=1;i<=8;i++){

let id="LM_CH"+i

let timer=createTimer(id)

container.appendChild(timer.box)

displays[id]=timer

}

/* update z serwera */

socket.on("update",(data)=>{

for(let id in data){

if(displays[id]){

let sec=data[id]
let timer=displays[id]

timer.time.innerText=format(sec)

let box=timer.box
box.classList.remove("grey","red","yellow","green")

if(sec===0) box.classList.add("grey")
else if(sec<3420) box.classList.add("red")
else if(sec<3600) box.classList.add("yellow")
else box.classList.add("green")

/* 57 min */

if(sec>=3420 && sec<3422){

if(!timer.beep57){
tripleBeep()
timer.beep57=true
}

}

/* 60 min */

if(sec>=3600 && sec<3602){

if(!timer.beep60){
singleBeep()
timer.beep60=true
}

}

}

}

})

</script>

</body>
</html>
