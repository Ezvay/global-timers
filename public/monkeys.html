<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Loch Małp</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
margin:0;
}

.topbar{
display:flex;
justify-content:space-between;
padding:20px 40px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:14px;
padding:20px;
}

.timer{
width:150px;
background:#1a1a1a;
padding:12px;
border-radius:8px;
border:2px solid #6a5125;
}

.time{
font-size:18px;
margin:6px 0;
font-weight:bold;
}

.grey{background:#2a2a2a;border-color:#555;}
.red{background:#2b0d0d;border-color:#7a1f1f;}
.yellow{background:#3a320e;border-color:#b8972e;}
.green{background:#0d2a13;border-color:#3fa34d;}

button{
background:#6b4d1f;
border:1px solid #caa64a;
color:#ffd36a;
font-size:11px;
padding:4px 8px;
margin:2px;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="topbar">
<button onclick="window.location.href='/'">⬅ Powrót</button>
<button id="soundToggle">🔊 Dźwięk ON</button>
</div>

<h1>Loch Małp</h1>

<div class="container" id="timers"></div>

<script>

const socket = io()

let timers={}
let displays={}

/* AUDIO */

let audioCtx=new(window.AudioContext||window.webkitAudioContext)()

function beep(d=0.15,f=800){

if(!soundEnabled) return

let o=audioCtx.createOscillator()
let g=audioCtx.createGain()

o.connect(g)
g.connect(audioCtx.destination)

o.frequency.value=f
o.start()

g.gain.setValueAtTime(0.2,audioCtx.currentTime)
g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d)

o.stop(audioCtx.currentTime+d)

}

function tripleBeep(){
beep()
setTimeout(()=>beep(),250)
setTimeout(()=>beep(),500)
}

function longBeep(){
beep(0.6,600)
}

/* SOUND */

let soundEnabled=localStorage.getItem("sound")!=="off"

const soundButton=document.getElementById("soundToggle")

function updateSound(){
soundButton.innerText=soundEnabled?"🔊 Dźwięk ON":"🔇 Dźwięk OFF"
}

updateSound()

soundButton.onclick=()=>{
soundEnabled=!soundEnabled
localStorage.setItem("sound",soundEnabled?"on":"off")
updateSound()
}

/* FORMAT */

function format(sec){

sec=Math.max(0,Math.floor(sec))

let h=Math.floor(sec/3600)
let m=Math.floor((sec%3600)/60)
let s=sec%60

return String(h).padStart(2,"0")+":"+
       String(m).padStart(2,"0")+":"+
       String(s).padStart(2,"0")

}

/* CREATE TIMER */

function createTimer(id){

let box=document.createElement("div")
box.className="timer grey"

let title=document.createElement("div")
title.innerText=id.replace("LM_","")

let time=document.createElement("div")
time.className="time"
time.innerText="00:00:00"

let start=document.createElement("button")
start.innerText="Start"

let stop=document.createElement("button")
stop.innerText="Stop"

let reset=document.createElement("button")
reset.innerText="Reset"

/* natychmiastowa reakcja */

start.onclick=()=>{
startLocal(id)
socket.emit("start",id)
}

stop.onclick=()=>{
stopLocal(id)
socket.emit("stop",id)
}

reset.onclick=()=>{
resetLocal(id)
socket.emit("reset",id)
}

box.appendChild(title)
box.appendChild(time)
box.appendChild(start)
box.appendChild(stop)
box.appendChild(reset)

return {box,time,beep57:false,beep60:false}

}

/* LOCAL CONTROL */

function startLocal(id){

let t=timers[id]

if(!t.running){

t.running=true
t.lastStart=Date.now()

}

}

function stopLocal(id){

let t=timers[id]

if(t.running){

t.time+=Math.floor((Date.now()-t.lastStart)/1000)
t.running=false

}

}

function resetLocal(id){

timers[id]={time:0,running:false,lastStart:0}

}

/* CREATE ALL */

let container=document.getElementById("timers")

for(let i=1;i<=8;i++){

let id="LM_CH"+i

timers[id]={time:0,running:false,lastStart:0}

let timer=createTimer(id)

container.appendChild(timer.box)

displays[id]=timer

}

/* SERVER SYNC */

socket.on("update",(data)=>{
timers=data
})

/* RENDER LOOP */

function render(){

for(let id in timers){

let t=timers[id]

let sec=t.time

if(t.running){

sec+=Math.floor((Date.now()-t.lastStart)/1000)

}

let timer=displays[id]

timer.time.innerText=format(sec)

let box=timer.box

box.classList.remove("grey","red","yellow","green")

if(sec===0) box.classList.add("grey")
else if(sec<3420) box.classList.add("red")
else if(sec<3600) box.classList.add("yellow")
else box.classList.add("green")

/* dźwięki */

if(sec>=3420 && sec<3421){

if(!timer.beep57){
tripleBeep()
timer.beep57=true
}

}

if(sec>=3600 && sec<3601){

if(!timer.beep60){
longBeep()
timer.beep60=true
}

}

}

requestAnimationFrame(render)

}

render()

</script>

</body>
</html>
