<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>Loch Małp</title>

<script src="/socket.io/socket.io.js"></script>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

.topbar{
display:flex;
justify-content:space-between;
max-width:900px;
margin:20px auto;
}

.backButton{
background:linear-gradient(#6b4d1f,#3b2a0f);
border:2px solid #caa64a;
color:#ffd36a;
padding:8px 18px;
border-radius:8px;
cursor:pointer;
}

.soundButton{
background:linear-gradient(#1e3d1e,#0f1f0f);
border:2px solid #5fa85f;
color:#9aff9a;
padding:8px 18px;
border-radius:8px;
cursor:pointer;
}

/* GRID */

.container{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
max-width:900px;
margin:auto;
}

/* wąskie */

@media (max-width:900px){

.container{
grid-template-columns:repeat(2,1fr);
}

}

/* bardzo niskie */

@media (max-height:650px){

.container{
grid-template-columns:1fr;
}

}

/* wysokie i wąskie */

@media (max-width:500px) and (min-height:800px){

.container{
grid-template-columns:repeat(8,1fr);
}

}

.timer{
background:linear-gradient(#1a1a1a,#0c0c0c);
padding:10px;
border-radius:8px;
border:2px solid #6a5125;
}

.time{
font-size:18px;
margin:6px 0;
font-weight:bold;
}

.grey{
border-color:#555;
background:linear-gradient(#2a2a2a,#111);
}

.red{
border-color:#7a1f1f;
background:linear-gradient(#2b0d0d,#1a0606);
}

.yellow{
border-color:#b8972e;
background:linear-gradient(#3a320e,#1c1707);
}

.green{
border-color:#3fa34d;
background:linear-gradient(#0d2a13,#07180b);
}

button{
background:linear-gradient(#6b4d1f,#3b2a0f);
border:1px solid #caa64a;
color:#ffd36a;
font-size:10px;
padding:4px 8px;
margin:2px;
border-radius:6px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="topbar">

<button class="backButton" onclick="window.location.href='/'">
⬅ Powrót
</button>

<button id="soundToggle" class="soundButton">
🔊 Dźwięk ON
</button>

</div>

<h1>Loch Małp</h1>

<div class="container" id="timers"></div>

<script>

const socket = io()

/* AUDIO */

let audioCtx = new (window.AudioContext || window.webkitAudioContext)()

function beep(duration=0.15,freq=800){

if(!soundEnabled) return

let osc=audioCtx.createOscillator()
let gain=audioCtx.createGain()

osc.connect(gain)
gain.connect(audioCtx.destination)

osc.frequency.value=freq
osc.type="sine"

osc.start()

gain.gain.setValueAtTime(0.2,audioCtx.currentTime)
gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+duration)

osc.stop(audioCtx.currentTime+duration)

}

function tripleBeep(){

beep()
setTimeout(()=>beep(),400)
setTimeout(()=>beep(),800)

}

function longBeep(){

beep(0.6,700)

}

/* SOUND */

let soundEnabled = localStorage.getItem("sound") !== "off"

const soundButton=document.getElementById("soundToggle")

function updateSound(){
soundButton.innerText=soundEnabled?"🔊 Dźwięk ON":"🔇 Dźwięk OFF"
}

updateSound()

soundButton.onclick=()=>{

soundEnabled=!soundEnabled
localStorage.setItem("sound",soundEnabled?"on":"off")
updateSound()

}

/* FORMAT */

function format(sec){

let h=String(Math.floor(sec/3600)).padStart(2,"0")
let m=String(Math.floor((sec%3600)/60)).padStart(2,"0")
let s=String(sec%60).padStart(2,"0")

return h+":"+m+":"+s

}

/* TIMER */

function createTimer(id){

let box=document.createElement("div")
box.className="timer grey"

let title=document.createElement("div")
title.innerText=id.replace("LM_","")

let time=document.createElement("div")
time.className="time"

let start=document.createElement("button")
start.innerText="Start"

let stop=document.createElement("button")
stop.innerText="Stop"

let reset=document.createElement("button")
reset.innerText="Reset"

start.onclick=()=>socket.emit("start",id)
stop.onclick=()=>socket.emit("stop",id)
reset.onclick=()=>socket.emit("reset",id)

box.appendChild(title)
box.appendChild(time)
box.appendChild(start)
box.appendChild(stop)
box.appendChild(reset)

return {box,time,beep57:false,beep60:false}

}

let container=document.getElementById("timers")
let displays={}

for(let i=1;i<=8;i++){

let id="LM_CH"+i

let timer=createTimer(id)

container.appendChild(timer.box)

displays[id]=timer

}

socket.on("update",(data)=>{

for(let id in data){

if(displays[id]){

let sec=data[id]
let timer=displays[id]

timer.time.innerText=format(sec)

let box=timer.box

box.classList.remove("grey","red","yellow","green")

if(sec === 0){

box.classList.add("grey")

}

else if(sec < 3420){

box.classList.add("red")

}

else if(sec < 3600){

box.classList.add("yellow")

}

else{

box.classList.add("green")

}

/* 57 min */

if(sec >=3420 && sec <3422){

if(!timer.beep57){
tripleBeep()
timer.beep57=true
}

}

/* 60 min */

if(sec >=3600 && sec <3602){

if(!timer.beep60){
longBeep()
timer.beep60=true
}

}

}

}

})

</script>

</body>
</html>
